<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>TestPro — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#EEF0FF;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--acc:#6C3FE8;--acc2:#C040C8;--border:rgba(108,63,232,.1);--shadow:0 2px 10px rgba(108,63,232,.07);--green:#059669;--red:#ef4444;--gold:#f59e0b}
[data-theme=dark]{--bg:#0d0820;--card:#140d28;--text:#e8e0ff;--text2:#9ca3af;--text3:#6b7280;--border:rgba(108,63,232,.2);--shadow:0 2px 12px rgba(0,0,0,.35)}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:var(--bg);color:var(--text);overflow-x:hidden}
.nav{position:fixed;top:0;left:0;right:0;height:54px;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;background:var(--bg);border-bottom:1px solid var(--border)}
.logo{font-family:'Unbounded',sans-serif;font-size:1.05rem;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-r{display:flex;align-items:center;gap:.4rem}
.ibtn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:.88rem;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;color:var(--text)}
[data-theme=dark] .ibtn{background:rgba(255,255,255,.1)}
.ava-btn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:900;font-size:.78rem;display:flex;align-items:center;justify-content:center}

/* SLIDE PANEL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800}
.ov.on{display:block}
.panel{position:fixed;top:0;right:-260px;width:240px;height:100vh;z-index:900;background:var(--card);border-left:1px solid var(--border);transition:right .28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.panel.on{right:0}
.p-head{background:linear-gradient(135deg,var(--acc),var(--acc2));padding:1.1rem 1rem .9rem;display:flex;align-items:center;gap:.6rem;position:relative;min-height:90px}
.p-ava{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:.9rem;font-family:'Unbounded',sans-serif;flex-shrink:0;overflow:hidden}
.p-ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-nm{font-size:.86rem;font-weight:800;color:#fff;margin-bottom:.1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-role{font-size:.68rem;color:rgba(255,255,255,.75);font-weight:600}
.p-close{position:absolute;top:.7rem;right:.7rem;width:26px;height:26px;border-radius:7px;border:none;background:rgba(255,255,255,.2);cursor:pointer;color:#fff;font-size:.82rem;display:flex;align-items:center;justify-content:center}
.p-body{flex:1;overflow-y:auto;padding:.6rem .65rem}
.ml{display:flex;align-items:center;gap:.55rem;padding:.65rem .75rem;border-radius:11px;font-size:.82rem;font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--text2);width:100%;text-align:left;transition:all .18s;margin-bottom:.14rem}
.ml:hover,.ml.on{background:rgba(108,63,232,.1);color:var(--acc)}
.mi{width:20px;text-align:center;flex-shrink:0;font-size:.92rem}
.pdiv{height:1px;background:var(--border);margin:.45rem 0}
.p-foot{padding:.7rem;border-top:1px solid var(--border)}
.lout{width:100%;padding:.6rem;border-radius:11px;border:1px solid rgba(239,68,68,.22);background:rgba(239,68,68,.07);color:#ef4444;font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit}

/* PAGE */
.page{padding:64px 0 4rem}
.w{padding:0 1rem}

/* GREET */
.greet{padding:.9rem 0 .4rem}
.greet-h{font-family:'Unbounded',sans-serif;font-size:.96rem;font-weight:900;margin-bottom:.06rem}
.greet-p{font-size:.72rem;color:var(--text3)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin:.65rem 0}
.sb{background:var(--card);border-radius:14px;padding:.75rem .4rem;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.sv{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-top:.08rem}

/* TABS */
.tab-bar{display:flex;gap:.2rem;padding:.15rem;background:rgba(108,63,232,.06);border-radius:13px;margin-bottom:1rem}
.tb{flex:1;padding:.48rem .3rem;border-radius:10px;font-size:.74rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:transparent;color:var(--text2);transition:all .18s;white-space:nowrap;text-align:center;min-width:0}
.tb.on{background:var(--card);color:var(--acc);box-shadow:0 2px 8px rgba(108,63,232,.1)}
[data-theme=dark] .tb.on{background:rgba(255,255,255,.07)}

/* CARDS SCROLL */
.scroll-row{display:flex;gap:.65rem;overflow-x:auto;padding-bottom:.35rem;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.scroll-row::-webkit-scrollbar{display:none}
.tc{min-width:160px;max-width:160px;flex-shrink:0;scroll-snap-align:start;background:var(--card);border-radius:16px;padding:.85rem;border:1.5px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .18s;display:flex;flex-direction:column}
.tc:hover{transform:translateY(-2px)}
.tc-ico{width:40px;height:40px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin-bottom:.5rem}
.tc-title{font-size:.82rem;font-weight:800;color:var(--text);margin-bottom:.14rem;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35;min-height:2.2em}
.tc-meta{font-size:.65rem;color:var(--text3);margin-bottom:.3rem}
.tc-chips{display:flex;gap:.2rem;flex-wrap:wrap;margin-bottom:.4rem}
.chip{display:inline-flex;align-items:center;padding:.11rem .36rem;border-radius:99px;font-size:.6rem;font-weight:700;background:rgba(108,63,232,.07);color:var(--acc);border:1px solid rgba(108,63,232,.1)}
.chip-g{background:rgba(5,150,105,.07);color:var(--green);border-color:rgba(5,150,105,.14)}
.chip-r{background:rgba(239,68,68,.07);color:var(--red);border-color:rgba(239,68,68,.14)}
.chip-y{background:rgba(245,158,11,.07);color:var(--gold);border-color:rgba(245,158,11,.14)}
.tc-btn{width:100%;padding:.45rem;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-family:inherit;font-size:.75rem;font-weight:700;margin-top:auto}

/* LIST ITEM */
.li{background:var(--card);border-radius:14px;padding:.75rem .9rem;border:1.5px solid var(--border);margin-bottom:.4rem;display:flex;align-items:center;gap:.6rem;cursor:pointer;transition:all .18s}
.li:hover{border-color:rgba(108,63,232,.28);transform:translateX(2px)}
.li.paused{opacity:.55}
.li-ico{width:38px;height:38px;border-radius:11px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-size:.85rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.14rem}
.li-chips{display:flex;gap:.2rem;flex-wrap:wrap}
.li-acts{display:flex;gap:.25rem;flex-shrink:0}
.icb{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:.76rem;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .18s}
.icb:hover{border-color:rgba(108,63,232,.35);color:var(--acc)}
.icb.del:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.05)}

/* RESULT ITEM */
.ri{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.7rem .85rem;margin-bottom:.38rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;cursor:pointer;transition:border-color .18s}
.ri:hover{border-color:rgba(108,63,232,.25)}
.ri-nm{font-size:.83rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.1rem}
.ri-dt{font-size:.67rem;color:var(--text3)}
.ri-sc{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:900}
.sc-g{color:var(--green)}.sc-a{color:var(--gold)}.sc-r{color:var(--red)}

/* SECTION */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.sec-t{font-size:.88rem;font-weight:800;display:flex;align-items:center;gap:.3rem}
.sec-cnt{font-size:.7rem;color:var(--text3);font-weight:600}

/* BUTTONS */
.btn-pr{display:inline-flex;align-items:center;gap:.3rem;padding:.55rem 1rem;border-radius:11px;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:.8rem;color:#fff;background:linear-gradient(135deg,var(--acc),var(--acc2))}
.btn-sec{display:inline-flex;align-items:center;gap:.3rem;padding:.52rem .85rem;border-radius:11px;border:1.5px solid var(--border);cursor:pointer;font-family:inherit;font-weight:700;font-size:.78rem;background:var(--card);color:var(--text2)}

/* SRCH */
.srch{width:100%;padding:.55rem .9rem;border-radius:11px;border:1.5px solid var(--border);font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;background:var(--card);color:var(--text);outline:none;transition:border .2s;margin-bottom:.75rem}
.srch:focus{border-color:var(--acc)}

/* ADMIN STATS */
.adm-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem;margin-bottom:1rem}
@media(min-width:460px){.adm-stats{grid-template-columns:repeat(4,1fr)}}

/* EMPTY */
.emp{text-align:center;padding:2.5rem 1rem}
.emp-e{font-size:2.3rem;margin-bottom:.6rem}
.emp-t{font-size:.88rem;font-weight:800;margin-bottom:.25rem}
.emp-s{font-size:.76rem;color:var(--text3);margin-bottom:1rem}

/* FAB */
.fab{position:fixed;bottom:1.4rem;right:1.1rem;width:50px;height:50px;border-radius:15px;border:none;cursor:pointer;z-index:200;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:1.25rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(108,63,232,.4);transition:transform .2s}
.fab:hover{transform:translateY(-3px)}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:900;align-items:flex-end;justify-content:center}
.mbg.open{display:flex}
@media(min-width:480px){.mbg{align-items:center}}
.mbox{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:1.4rem}
@media(min-width:480px){.mbox{border-radius:24px}}
.m-t{font-family:'Unbounded',sans-serif;font-size:.9rem;font-weight:900;margin-bottom:.65rem}
.m-foot{display:flex;gap:.5rem;margin-top:1rem}

/* CODE MODAL */
.ci-row{display:flex;gap:.4rem;justify-content:center;margin:.8rem 0}
.ci{width:42px;height:48px;border-radius:11px;border:1.5px solid var(--border);background:var(--bg);font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:900;text-align:center;color:var(--text);outline:none;transition:border .2s}
.ci:focus{border-color:var(--acc);background:var(--card)}
.cmsg{font-size:.78rem;font-weight:600;text-align:center;min-height:1.2rem;color:var(--text3)}

/* SPINNER */
.sp{width:28px;height:28px;border:3px solid rgba(108,63,232,.15);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:.6rem 1.3rem;border-radius:12px;font-size:.82rem;font-weight:700;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none}
[data-theme=dark] .toast{background:rgba(232,224,255,.95);color:#1a1a2e}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
/* THEME */
const TH={get(){return localStorage.getItem('tp_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')},set(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('tp_theme',t);document.getElementById('tbtn').textContent=t==='dark'?'☀️':'🌙'},toggle(){this.set(this.get()==='dark'?'light':'dark')}};
TH.set(TH.get());document.getElementById('tbtn').onclick=()=>TH.toggle();

/* TOAST */
let _tt;
function toast(m,d=2500){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),d);}

/* MENU */
function openMenu(){document.getElementById('panel').classList.add('on');document.getElementById('ov').classList.add('on');}
function closeMenu(){document.getElementById('panel').classList.remove('on');document.getElementById('ov').classList.remove('on');}

/* MODALS */
function closeMb(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mbg').forEach(m=>m.onclick=e=>{if(e.target===m)closeMb(m.id);});

/* LOGOUT */
function doLogout(){if(!confirm('Chiqmoqchimisiz?'))return;TGAuth.clear();goTo('login.html');}

/* STATE */
let CU=null,UID='',isAdmin=false;
let allPub=[],filtPub=[];
let allAdm=[],filtAdm=[];
let admLoaded=false;

/* INIT */
(async()=>{
  CU=await AuthHelpers.requireAuth('login.html');
  if(!CU)return;
  UID=String(CU.id||CU.uid||CU._tg_id||'');
  const name=[CU.first_name,CU.last_name].filter(Boolean).join(' ')||CU.name||'Foydalanuvchi';

  // Avatar
  const ini=(name[0]||'?').toUpperCase();
  document.getElementById('nav-ava').textContent=ini;
  document.getElementById('p-ava').textContent=ini;
  if(CU.photo_url){
    const img=document.createElement('img');img.src=CU.photo_url;
    document.getElementById('p-ava').innerHTML='';document.getElementById('p-ava').appendChild(img);
    document.getElementById('nav-ava').style.backgroundImage=`url(${CU.photo_url})`;
    document.getElementById('nav-ava').style.backgroundSize='cover';
    document.getElementById('nav-ava').textContent='';
  }
  document.getElementById('p-nm').textContent=name;
  document.getElementById('greet-h').textContent='Salom, '+name.split(' ')[0]+'! 👋';
  document.getElementById('greet-p').textContent=CU.username?'@'+CU.username:'ID: '+UID;

  // Admin check
  try{const ud=await DB.getUser(UID);isAdmin=!!(ud?.is_admin||ud?.role==='admin');}catch{}
  if(isAdmin){
    document.getElementById('p-role').textContent='👑 Admin';
    document.getElementById('tb-adm').style.display='';
    document.getElementById('admin-menu-wrap').innerHTML=`<div class="pdiv"></div>
      <button class="ml" style="color:#d97706" onclick="closeMenu();showTab('adm')"><span class="mi">👑</span>Admin panel</button>`;
  }

  // Load
  loadMyTests();
  loadStats();
})();

/* TABS */
function showTab(t){
  ['my','pub','hist','adm'].forEach(x=>{
    document.getElementById('pane-'+x).style.display=x===t?'block':'none';
    const b=document.getElementById('tb-'+x);if(b)b.classList.toggle('on',x===t);
  });
  if(t==='pub'&&!allPub.length)loadPubTests();
  if(t==='hist')loadHist();
  if(t==='adm'&&isAdmin&&!admLoaded){admLoaded=true;loadAdm();}
}

/* ═══ MY TESTS ═══ */
async function loadMyTests(){
  const wrap=document.getElementById('my-list');
  try{
    const list=await DB.getMyTests(UID);
    document.getElementById('s-t').textContent=list.length;
    if(!list.length){
      wrap.innerHTML=`<div class="emp"><div class="emp-e">📝</div><div class="emp-t">Test yaratilmagan</div><div class="emp-s">Birinchi testingizni yarating!</div><button class="btn-pr" onclick="goTo('create.html')">✏️ Yangi test</button></div>`;
      return;
    }
    wrap.innerHTML='';
    list.forEach(t=>wrap.appendChild(buildItem(t,false)));
  }catch(e){wrap.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--red);font-size:.83rem">❌ ${esc(e.message)}</div>`;}
}

/* ═══ STATS ═══ */
async function loadStats(){
  try{
    const res=await DB.getMyResults(UID,0);
    document.getElementById('s-d').textContent=res.length;
    if(res.length){
      const avg=Math.round(res.reduce((s,r)=>s+(r.percentage||r.score||0),0)/res.length);
      document.getElementById('s-a').textContent=avg+'%';
    }
  }catch{}
}

/* ═══ PUBLIC ═══ */
async function loadPubTests(){
  const wrap=document.getElementById('pub-list');
  try{
    allPub=await DB.getPublicTests();
    filtPub=[...allPub];
    document.getElementById('pub-cnt').textContent=allPub.length+' ta';
    renderPub();
  }catch(e){wrap.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--red);font-size:.83rem">❌ ${esc(e.message)}</div>`;}
}
function filterPub(){
  const q=document.getElementById('pub-srch').value.toLowerCase();
  filtPub=q?allPub.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q)):[...allPub];
  renderPub();
}
function renderPub(){
  const wrap=document.getElementById('pub-list');
  if(!filtPub.length){wrap.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--text3);font-size:.84rem">Test topilmadi</div>';return;}
  // Group by category
  const grps={};
  filtPub.forEach(t=>{const k=t.category||t.subject||'other';if(!grps[k])grps[k]=[];grps[k].push(t);});
  wrap.innerHTML='';
  Object.entries(grps).forEach(([cat,arr])=>{
    const ico=getIco(cat);
    const sub=getSubject(cat);
    const sec=document.createElement('div');sec.style.marginBottom='1.2rem';
    const hdr=document.createElement('div');hdr.className='sec-hdr';
    hdr.innerHTML=`<div class="sec-t">${ico} ${esc(sub.label)}</div><span class="sec-cnt">${arr.length} ta</span>`;
    sec.appendChild(hdr);
    const row=document.createElement('div');row.className='scroll-row';
    arr.forEach(t=>{
      const c=document.createElement('div');c.className='tc';
      c.onclick=()=>goTo('test.html?id='+t.test_id);
      c.innerHTML=`<div class="tc-ico">${ico}</div>
        <div class="tc-title">${esc(t.title)}</div>
        <div class="tc-meta">👤 ${esc(t.creator_name||'Anonim')}</div>
        <div class="tc-chips">
          <span class="chip">📝 ${t.question_count||0}</span>
          <span class="chip">👁 ${t.solve_count||0}</span>
          ${t.avg_score?`<span class="chip chip-g">⭐${Math.round(t.avg_score)}%</span>`:''}
          ${t.difficulty==='expert'?`<span class="chip chip-r">🔥</span>`:t.difficulty==='easy'?`<span class="chip chip-g">😊</span>`:''}
        </div>
        <button class="tc-btn">Boshlash →</button>`;
      row.appendChild(c);
    });
    sec.appendChild(row);
    wrap.appendChild(sec);
  });
}

/* ═══ HISTORY ═══ */
async function loadHist(){
  const wrap=document.getElementById('hist-list');
  const all=await DB.getMyResults(UID,0);
  if(!all.length){
    wrap.innerHTML=`<div class="emp"><div class="emp-e">📜</div><div class="emp-t">Tarix bo'sh</div><div class="emp-s">Hali test yechmagansiz</div></div>`;
    return;
  }
  wrap.innerHTML='';
  all.forEach(r=>{
    const pct=Math.round(r.percentage||r.score||0);
    const cls=pct>=80?'sc-g':pct>=50?'sc-a':'sc-r';
    const d=r.completedAt?new Date(r.completedAt):null;
    const ds=d?d.toLocaleDateString('uz-UZ',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'}):'';
    const el=document.createElement('div');el.className='ri';
    el.onclick=()=>goTo('review.html?id='+r.id);
    el.innerHTML=`<div style="flex:1;min-width:0">
      <div class="ri-nm">${esc(r.testTitle||r.testId||'Test')}</div>
      <div class="ri-dt">${getIco(r.subject||'other')} ${ds} · ${r.correct||0}/${r.total||0}</div>
    </div>
    <div style="display:flex;align-items:center;gap:.4rem;flex-shrink:0">
      <div class="ri-sc ${cls}">${pct}%</div>
      <button onclick="event.stopPropagation();goTo('review.html?id=${r.id}')" style="padding:.2rem .5rem;border-radius:7px;border:1.5px solid rgba(108,63,232,.22);background:rgba(108,63,232,.07);color:var(--acc);font-size:.62rem;font-weight:700;cursor:pointer;font-family:inherit">🔍</button>
    </div>`;
    wrap.appendChild(el);
  });
}
function clearHist(){
  if(!confirm('Barcha natijalar tarixini tozalashni xohlaysizmi?'))return;
  localStorage.removeItem('tp_results');
  toast('🗑 Tarix tozalandi');
  loadHist();
}

/* ═══ ADMIN ═══ */
async function loadAdm(){
  if(!isAdmin)return;
  const wrap=document.getElementById('adm-list');
  wrap.innerHTML='<span class="sp"></span>';
  try{
    const [stats,list]=await Promise.all([DB.adminGetStats().catch(()=>({})),DB.adminGetTests().catch(()=>[])]);
    allAdm=list;filtAdm=[...list];
    document.getElementById('as-total').textContent=stats.totalTests||list.length||0;
    document.getElementById('as-pub').textContent=stats.pubTests||list.filter(t=>t.visibility==='public').length||0;
    document.getElementById('as-solve').textContent=stats.totalSolve||list.reduce((s,t)=>s+(t.solve_count||0),0)||0;
    document.getElementById('as-avg').textContent=(stats.avgScore||0)+'%';
    document.getElementById('adm-cnt').textContent=list.length+' ta';
    renderAdm();
  }catch(e){wrap.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--red);font-size:.83rem">❌ ${esc(e.message)}</div>`;}
}
function filterAdm(){
  const q=document.getElementById('adm-srch').value.toLowerCase();
  filtAdm=q?allAdm.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.creator_name||'').toLowerCase().includes(q)):[...allAdm];
  renderAdm();
}
function renderAdm(){
  const wrap=document.getElementById('adm-list');
  if(!filtAdm.length){wrap.innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--text3);font-size:.84rem">Test topilmadi</div>';return;}
  wrap.innerHTML='';
  filtAdm.forEach(t=>wrap.appendChild(buildItem(t,true)));
}

/* ═══ BUILD LIST ITEM ═══ */
function buildItem(t,adminMode){
  const el=document.createElement('div');
  el.className='li'+(t.is_paused?' paused':'');
  const ico=getIco(t.category||t.subject);
  const vis=t.visibility==='public'?'<span class="chip chip-g">🌐</span>':t.visibility==='link'?'<span class="chip chip-y">🔗</span>':'<span class="chip chip-r">🔒</span>';
  el.innerHTML=`
    <div class="li-ico">${ico}</div>
    <div class="li-info">
      <div class="li-name">${esc(t.title)}</div>
      <div class="li-chips">
        ${vis}
        ${t.is_paused?'<span class="chip chip-r">⏸</span>':''}
        <span class="chip">📝 ${t.question_count||0}</span>
        <span class="chip">👁 ${t.solve_count||0}</span>
        ${t.avg_score?`<span class="chip chip-g">⭐${Math.round(t.avg_score)}%</span>`:''}
        ${adminMode&&t.creator_name?`<span class="chip" style="font-size:.57rem">👤 ${esc(t.creator_name.split(' ')[0])}</span>`:''}
      </div>
    </div>
    <div class="li-acts">
      <button class="icb" onclick="event.stopPropagation();shareTest('${t.test_id||t.id}','${esc(t.title)}')" title="Ulashish">🔗</button>
      ${adminMode?`
        <button class="icb" onclick="event.stopPropagation();admPause('${t.test_id||t.id}',this)" title="${t.is_paused?'Davom':'Pause'}">${t.is_paused?'▶':'⏸'}</button>
        <button class="icb del" onclick="event.stopPropagation();askDel('${t.test_id||t.id}','${esc(t.title)}',true)" title="O'chirish">🗑</button>
      `:`
        <button class="icb" onclick="event.stopPropagation();goTo('create.html?id=${t.test_id||t.id}')" title="Tahrirlash">✏️</button>
        <button class="icb del" onclick="event.stopPropagation();askDel('${t.test_id||t.id}','${esc(t.title)}',false)" title="O'chirish">🗑</button>
      `}
    </div>`;
  el.onclick=()=>goTo('test.html?id='+(t.test_id||t.id));
  return el;
}

/* SHARE */
async function shareTest(id,title){
  const url=`${location.origin}/test.html?id=${id}`;
  try{
    if(navigator.share){await navigator.share({title,url});return;}
    await navigator.clipboard.writeText(url);
  }catch{try{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}catch{}}
  toast('🔗 Link nusxalandi!');
}

/* DELETE */
function askDel(id,title,adminMode){
  document.getElementById('del-txt').textContent=`"${title}" testini o'chirishni xohlaysizmi? Bu amalni qaytarib bo'lmaydi.`;
  document.getElementById('del-ok').onclick=async()=>{
    try{
      if(adminMode){await DB.adminDeleteTest(id);admLoaded=false;}
      else await DB.deleteTest(id);
      closeMb('del-modal');
      toast('✅ O\'chirildi');
      if(adminMode)loadAdm();else loadMyTests();
    }catch(e){toast('❌ '+e.message);}
  };
  document.getElementById('del-modal').classList.add('open');
}

/* ADMIN PAUSE */
async function admPause(id,btn){
  try{
    const res=await DB.adminTogglePause(id);
    const p=!!res.is_paused;
    btn.textContent=p?'▶':'⏸';
    btn.closest('.li').classList.toggle('paused',p);
    // Update data
    const t=allAdm.find(x=>(x.test_id||x.id)===id);if(t)t.is_paused=p;
    toast(p?'⏸ Pauza qilindi':'▶ Davom ettirildi');
  }catch(e){toast('❌ '+e.message);}
}

/* CODE MODAL */
function openCode(){
  document.querySelectorAll('.ci').forEach(i=>i.value='');
  document.getElementById('code-msg').textContent='';
  document.getElementById('code-modal').classList.add('open');
  setTimeout(()=>document.querySelectorAll('.ci')[0].focus(),200);
}
// CI nav
document.querySelectorAll('.ci').forEach((inp,i,all)=>{
  inp.oninput=()=>{inp.value=inp.value.toUpperCase().slice(-1);if(inp.value&&all[i+1])all[i+1].focus();};
  inp.onkeydown=e=>{if(e.key==='Backspace'&&!inp.value&&all[i-1])all[i-1].focus();if(e.key==='Enter')doCode();};
});

async function doCode(){
  const code=[...document.querySelectorAll('.ci')].map(i=>i.value).join('');
  const msg=document.getElementById('code-msg');
  if(code.length<6){msg.style.color='var(--red)';msg.textContent='Kodni to\'liq kiriting';return;}
  msg.style.color='var(--text3)';msg.textContent='⏳ Qidirilmoqda...';
  try{
    const t=await DB.getTestByCode(code);
    if(!t){msg.style.color='var(--red)';msg.textContent='❌ Kod topilmadi';return;}
    msg.style.color='var(--green)';msg.textContent='✅ Topildi: '+t.title;
    setTimeout(()=>{closeMb('code-modal');goTo('test.html?id='+(t.test_id||t.id));},800);
  }catch(e){msg.style.color='var(--red)';msg.textContent='❌ '+e.message;}
}
</script>

<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TestPro — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#EEF0FF;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;
  --acc:#6C3FE8;--acc2:#C040C8;--border:rgba(108,63,232,.1);
  --shadow:0 2px 10px rgba(108,63,232,.07)}
[data-theme=dark]{--bg:#0d0820;--card:#140d28;--text:#e8e0ff;--text2:#9ca3af;--text3:#6b7280;
  --border:rgba(108,63,232,.2);--shadow:0 2px 12px rgba(0,0,0,.35)}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:var(--bg);color:var(--text);overflow-x:hidden}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:54px;z-index:500;
  display:flex;align-items:center;justify-content:space-between;padding:0 1rem;background:var(--bg)}
.logo{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:900;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-r{display:flex;align-items:center;gap:.4rem}
.ava{width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;cursor:pointer;color:#fff;font-weight:900;font-size:.8rem;font-family:'Unbounded',sans-serif;
  overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ibtn{width:34px;height:34px;border-radius:99px;border:none;cursor:pointer;font-size:.88rem;
  background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;transition:all .2s}
[data-theme=dark] .ibtn{background:rgba(255,255,255,.1)}
.mbtn{width:34px;height:34px;border-radius:10px;border:none;cursor:pointer;
  background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center}
[data-theme=dark] .mbtn{background:rgba(255,255,255,.1)}
.lines{display:flex;flex-direction:column;gap:4px;pointer-events:none}
.lines span{width:16px;height:2px;background:var(--text2);border-radius:2px;display:block}

/* MENU */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800}
.ov.on{display:block}
.panel{position:fixed;top:0;right:-260px;width:240px;height:100vh;z-index:900;
  background:var(--card);border-left:1px solid var(--border);
  transition:right .28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.panel.on{right:0}
.p-head{background:linear-gradient(135deg,var(--acc),var(--acc2));
  padding:1.1rem 1rem .9rem;display:flex;align-items:center;gap:.6rem;position:relative;min-height:88px}
.p-ava{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.25);
  border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;
  font-weight:900;color:#fff;font-size:.9rem;font-family:'Unbounded',sans-serif;flex-shrink:0;overflow:hidden}
.p-ava img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-nm{font-size:.86rem;font-weight:800;color:#fff;margin-bottom:.12rem}
.p-role{font-size:.68rem;color:rgba(255,255,255,.75);font-weight:600}
.p-close{position:absolute;top:.65rem;right:.65rem;width:27px;height:27px;border-radius:7px;
  border:none;background:rgba(255,255,255,.2);cursor:pointer;color:#fff;font-size:.82rem;
  display:flex;align-items:center;justify-content:center}
.p-body{flex:1;overflow-y:auto;padding:.6rem .65rem}
.ml{display:flex;align-items:center;gap:.55rem;padding:.65rem .75rem;border-radius:11px;
  font-size:.82rem;font-weight:700;cursor:pointer;background:none;border:none;
  font-family:inherit;color:var(--text2);width:100%;text-align:left;transition:all .18s;margin-bottom:.18rem}
.ml:hover,.ml.on{background:rgba(108,63,232,.1);color:var(--acc)}
.ml .mi{width:20px;text-align:center;flex-shrink:0;font-size:.92rem}
.p-foot{padding:.7rem;border-top:1px solid var(--border)}
.lout{width:100%;padding:.62rem;border-radius:11px;border:1px solid rgba(239,68,68,.22);
  background:rgba(239,68,68,.07);color:#ef4444;font-weight:700;font-size:.82rem;
  cursor:pointer;font-family:inherit;transition:all .2s}
.lout:hover{background:rgba(239,68,68,.15)}

/* PAGE */
.page{padding:66px 0 3rem}
.w{padding:0 1rem}

/* GREET */
.greet{padding:.85rem 0 .5rem}
.greet-h{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:900;margin-bottom:.08rem}
.greet-p{font-size:.72rem;color:var(--text3)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin:.7rem 0}
.sb{background:var(--card);border-radius:14px;padding:.75rem .5rem;text-align:center;
  border:1px solid var(--border);box-shadow:var(--shadow)}
.sv{font-family:'Unbounded',sans-serif;font-size:1.2rem;font-weight:900;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-top:.08rem}

/* SECTION */
.sec{margin-bottom:1.4rem}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.sec-t{font-size:.88rem;font-weight:800;display:flex;align-items:center;gap:.3rem}
.sec-t span{font-size:.7rem;font-weight:600;color:var(--text3)}
.sec-new{padding:.3rem .75rem;border-radius:99px;font-size:.74rem;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;transition:all .2s}
.sec-new:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,63,232,.3)}
.see-all{font-size:.74rem;font-weight:700;color:var(--acc);cursor:pointer;
  background:none;border:1.5px solid rgba(108,63,232,.25);font-family:inherit;
  padding:.26rem .65rem;border-radius:99px;transition:all .18s}
.see-all:hover{background:rgba(108,63,232,.07)}

/* GROUP (ommaviy) */
.grp{margin-bottom:1.4rem}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.grp-l{display:flex;align-items:center;gap:.58rem}
.grp-icon{width:40px;height:40px;border-radius:12px;
  background:rgba(255,255,255,.9);box-shadow:0 2px 8px rgba(0,0,0,.07);
  display:flex;align-items:center;justify-content:center;font-size:1.35rem}
[data-theme=dark] .grp-icon{background:rgba(255,255,255,.1)}
.grp-nm{font-size:.82rem;font-weight:800;color:var(--text)}
.grp-ct{font-size:.68rem;color:var(--text3);font-weight:600}

/* SCROLL */
.scroll{display:flex;gap:.65rem;overflow-x:auto;padding-bottom:.35rem;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* CARD (scroll ichida) */
.card{min-width:165px;max-width:165px;flex-shrink:0;scroll-snap-align:start;
  background:var(--card);border-radius:16px;padding:.85rem;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(108,63,232,.15)}
.card-icon{width:42px;height:42px;border-radius:12px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:1.35rem;margin-bottom:.55rem}
.card-t{font-size:.82rem;font-weight:800;color:var(--text);margin-bottom:.12rem;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35}
.card-au{font-size:.65rem;color:var(--text3);margin-bottom:.38rem;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chips{display:flex;gap:.25rem;flex-wrap:wrap;margin-bottom:.5rem}
.ch{display:inline-flex;align-items:center;padding:.13rem .38rem;border-radius:99px;
  font-size:.62rem;font-weight:600;background:rgba(108,63,232,.07);color:var(--acc);
  border:1px solid rgba(108,63,232,.1)}
[data-theme=dark] .ch{background:rgba(108,63,232,.2)}
.card-btn{display:block;width:100%;padding:.55rem;border-radius:10px;border:none;
  cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  font-family:inherit;font-size:.78rem;font-weight:700;text-align:center;transition:all .2s;margin-top:auto}
.card-btn:hover{box-shadow:0 4px 12px rgba(108,63,232,.3)}

/* LIST ITEM (ro'yxat ko'rinishi) */
.li{background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:.75rem .9rem;margin-bottom:.42rem;
  display:flex;align-items:center;gap:.6rem;cursor:pointer;transition:all .18s}
.li:hover{border-color:rgba(108,63,232,.3);transform:translateX(2px);box-shadow:0 3px 12px rgba(108,63,232,.1)}
.li-ico{width:36px;height:36px;border-radius:10px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-nm{font-size:.84rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.1rem}
.li-meta{font-size:.67rem;color:var(--text3);display:flex;gap:.35rem;flex-wrap:wrap}
.li-btn{padding:.28rem .7rem;border-radius:9px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  font-family:inherit;font-size:.7rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.li-acts{display:flex;gap:.22rem;flex-shrink:0}
.ab{width:29px;height:29px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.78rem;transition:all .2s}
.ab:hover{background:rgba(108,63,232,.1);border-color:rgba(108,63,232,.3)}
.ab-del{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2)}
.ab-del:hover{background:rgba(239,68,68,.18)}

/* VISIBILITY TAG */
.vtag{display:inline-block;padding:.1rem .42rem;border-radius:99px;font-size:.59rem;font-weight:700;margin-left:.2rem}
.vt-pub{background:rgba(16,185,129,.1);color:#059669;border:1px solid rgba(16,185,129,.2)}
.vt-priv{background:rgba(245,158,11,.1);color:#d97706;border:1px solid rgba(245,158,11,.22)}
.vt-code{background:rgba(108,63,232,.1);color:var(--acc);border:1px solid rgba(108,63,232,.22)}

/* RESULT ITEM */
.ri{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:.7rem .85rem;margin-bottom:.4rem;
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;cursor:pointer;transition:all .18s}
.ri:hover{border-color:rgba(108,63,232,.25);transform:translateX(2px)}
.ri-nm{font-size:.83rem;font-weight:700;color:var(--text);margin-bottom:.1rem;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-dt{font-size:.68rem;color:var(--text3)}
.ri-sc{font-family:'Unbounded',sans-serif;font-size:.88rem;font-weight:900;flex-shrink:0}
.sc-g{color:#10b981}.sc-a{color:#f59e0b}.sc-r{color:#ef4444}

/* BACK BTN */
.back-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .75rem;margin-bottom:.8rem;
  border-radius:10px;border:1.5px solid var(--border);background:var(--card);
  cursor:pointer;font-size:.8rem;font-weight:700;color:var(--text2);
  width:fit-content;transition:all .18s}
.back-btn:hover{border-color:rgba(108,63,232,.3);color:var(--acc)}

/* QUICK ACTIONS */
.qa-wrap{display:flex;flex-direction:column;gap:.45rem}
.qa{display:flex;align-items:center;justify-content:center;gap:.4rem;width:100%;
  padding:.76rem;border-radius:13px;font-family:inherit;font-size:.84rem;font-weight:700;
  cursor:pointer;border:none;transition:all .2s}
.qa-p{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.qa-p:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,63,232,.32)}
.qa-s{background:var(--card);border:1.5px solid var(--border);color:var(--text2)}
.qa-s:hover{border-color:rgba(108,63,232,.4);color:var(--acc)}

/* CODE MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;
  align-items:center;justify-content:center;padding:1rem}
.modal-bg.on{display:flex}
.modal{background:var(--card);border-radius:20px;padding:1.35rem;width:100%;max-width:300px;
  box-shadow:0 20px 60px rgba(0,0,0,.25)}
.ci{width:36px;height:42px;text-align:center;font-family:'Unbounded',sans-serif;
  font-weight:900;font-size:1rem;border:2px solid rgba(108,63,232,.2);border-radius:8px;
  background:rgba(108,63,232,.04);color:var(--text);outline:none;transition:border-color .2s}
.ci:focus{border-color:var(--acc)}

/* THEME SWITCH */
.sw{position:relative;display:inline-block;width:38px;height:20px}
.sw input{opacity:0;width:0;height:0}
.sw-s{position:absolute;cursor:pointer;inset:0;background:rgba(0,0,0,.15);border-radius:99px;transition:.3s}
.sw-s::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;
  background:#fff;border-radius:50%;transition:.3s}
.sw input:checked+.sw-s{background:linear-gradient(135deg,var(--acc),var(--acc2))}
.sw input:checked+.sw-s::before{transform:translateX(18px)}

/* TOAST */
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);
  background:rgba(10,5,25,.9);color:#fff;padding:.58rem 1rem;border-radius:11px;
  font-size:.78rem;font-weight:600;z-index:9999;backdrop-filter:blur(12px);
  white-space:nowrap;animation:fau .3s ease both}
@keyframes fau{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* LOADER / EMPTY */
.sp{width:26px;height:26px;border:3px solid rgba(108,63,232,.15);border-top-color:var(--acc);
  border-radius:50%;animation:spin .7s linear infinite;margin:1.5rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.emp{text-align:center;padding:1rem;color:var(--text3);font-size:.78rem}
.err{color:#ef4444;font-size:.78rem;text-align:center;padding:1rem}
.divider{height:1px;background:var(--border);margin:.6rem 0}
</style>
</head>

      style="width:100%;padding:.75rem;border-radius:11px;border:none;
        background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;

    </button>

</div>

<script src="js/api.js"></script>
<script>
/* THEME */
const TH={
  get(){return localStorage.getItem('tp_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')},
  set(t){
    document.documentElement.setAttribute('data-theme',t);localStorage.setItem('tp_theme',t);
    const b=document.getElementById('tbtn');if(b)b.textContent=t==='dark'?'☀️':'🌙';
    const s1=document.getElementById('sw1');const s2=document.getElementById('sw2');
    if(s1)s1.checked=t==='dark';if(s2)s2.checked=t==='dark';
  },
  toggle(){this.set(this.get()==='dark'?'light':'dark')}
};
TH.set(TH.get());
document.getElementById('tbtn').onclick=()=>TH.toggle();
document.getElementById('sw1').onchange=()=>TH.toggle();
document.getElementById('sw2').onchange=()=>TH.toggle();

/* MENU */
const panel=document.getElementById('panel');
const ov=document.getElementById('ov');
function openMenu(){panel.classList.add('on');ov.classList.add('on');}
function closeMenu(){panel.classList.remove('on');ov.classList.remove('on');}
document.getElementById('mbtn').onclick=openMenu;
document.getElementById('pcl').onclick=closeMenu;

/* TOAST */
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

/* AVA */
function setAva(id,u,name){
  const el=document.getElementById(id);if(!el)return;
  if(u?.photo_url){el.innerHTML=`<img src="${u.photo_url}" alt=""/>`;}
  else{el.textContent=(name||'U')[0].toUpperCase();}
}

const ICON={english:'🇬🇧',arabic:'🕌',russian:'🇷🇺',turkish:'🇹🇷',math:'🧮',it:'💻',science:'🔬',religion:'📖',other:'📚'};

/* CODE MODAL */
function openCode(){
  document.getElementById('code-bg').classList.add('on');
  setTimeout(()=>document.querySelectorAll('.ci')[0]?.focus(),100);
}
function closeCode(){
  document.getElementById('code-bg').classList.remove('on');
  document.getElementById('code-msg').textContent='';
  document.querySelectorAll('.ci').forEach(i=>i.value='');
}
document.getElementById('code-bg').addEventListener('click',function(e){if(e.target===this)closeCode();});
document.querySelectorAll('.ci').forEach((inp,i,all)=>{
  inp.oninput=()=>{inp.value=inp.value.toUpperCase().slice(-1);if(inp.value&&all[i+1])all[i+1].focus();};
  inp.onkeydown=e=>{if(e.key==='Backspace'&&!inp.value&&all[i-1])all[i-1].focus();};
});
window.doCode=async()=>{
  const code=[...document.querySelectorAll('.ci')].map(i=>i.value).join('');
  const msg=document.getElementById('code-msg');
  if(code.length<6){msg.style.color='#ef4444';msg.textContent='Kodni to\'liq kiriting';return;}
  msg.style.color='var(--text3)';msg.textContent='⏳ Qidirilmoqda...';
  try{
    const test=await DB.getTestByCode(code);
    if(!test){msg.style.color='#ef4444';msg.textContent='❌ Kod topilmadi';return;}
    msg.style.color='#059669';msg.textContent=`✅ "${test.title}" topildi!`;
    setTimeout(()=>{closeCode();goTo('test.html?id='+(test.test_id||test.id));},800);
  }catch(e){msg.style.color='#ef4444';msg.textContent='❌ '+e.message;}
};

/* DELETE */
window.delTest=async(id)=>{
  if(!confirm('Testni o\'chirishni xohlaysizmi?'))return;
  try{await DB.deleteTest(id);toast('✅ O\'chirildi');setTimeout(()=>location.reload(),700);}
  catch(e){toast('❌ '+e.message);}
};

/* ══ KARTA qurish ══ */
function buildCard(t, icon){
  const c=document.createElement('div');c.className='card';
  c.onclick=()=>goTo('test.html?id='+(t.test_id||t.id));
  c.innerHTML=`
    <div class="card-icon">${icon}</div>
    <div class="card-t">${esc(t.title)}</div>
    <div class="card-au">${esc(t.creator_name||t.authorName||'Anonim')}</div>
    <div class="chips">
      <span class="ch">📝 ${t.question_count||0}</span>
      <span class="ch">👁 ${t.solve_count||0}</span>
      ${t.avg_score?`<span class="ch">⭐${Math.round(t.avg_score)}%</span>`:''}
    </div>
    <button class="card-btn">Boshlash →</button>`;
  return c;
}

/* ══ RO'YXAT ELEMENTI qurish ══ */
function buildListItem(t, icon){
  const el=document.createElement('div');el.className='li';
  el.onclick=()=>goTo('test.html?id='+(t.test_id||t.id));
  el.innerHTML=`
    <div class="li-ico">${icon}</div>
    <div class="li-info">
      <div class="li-nm">${esc(t.title)}</div>
      <div class="li-meta">
        <span>📝 ${t.question_count||0}</span>
        <span>👁 ${t.solve_count||0}</span>
        ${t.avg_score?`<span>⭐${Math.round(t.avg_score)}%</span>`:''}
        <span>${esc(t.creator_name||'Anonim')}</span>
      </div>
    </div>
    <button class="li-btn" onclick="event.stopPropagation()">▶️</button>`;
  el.querySelector('.li-btn').onclick=(e)=>{e.stopPropagation();goTo('test.html?id='+(t.test_id||t.id));};

/* ══ MENING TESTLARIM ro'yxat elementi ══ */
function buildMyListItem(t, isAdmin_){
  const tid=t.test_id||t.id;
  const owner=String(t.creator_id)===UID;
  const vtag=t.visibility==='public'
    ?'<span class="vtag vt-pub">🌐</span>'
    :t.visibility==='link'?'<span class="vtag vt-code">🔗</span>'
    :'<span class="vtag vt-priv">🔒</span>';
  const el=document.createElement('div');el.className='li';
  el.onclick=()=>goTo('test.html?id='+tid);
  el.innerHTML=`
    <div class="li-ico">📋</div>
    <div class="li-info">
      <div class="li-nm">${esc(t.title)} ${vtag}</div>
      <div class="li-meta">
        <span>📝 ${t.question_count||0}</span>
        <span>👁 ${t.solve_count||0}</span>
        ${t.time_limit?`<span>⏱ ${t.time_limit}daq</span>`:''}
      </div>
    </div>
    <div class="li-acts">
      <button class="ab" title="Boshlash">▶️</button>
      ${(owner||isAdmin_)?`<button class="ab" title="Tahrirlash">✏️</button>`:''}
      ${(owner||isAdmin_)?`<button class="ab ab-del" title="O'chirish">🗑️</button>`:''}
    </div>`;
  const btns=el.querySelectorAll('.ab');
  let bi=0;
  btns[bi++].onclick=(e)=>{e.stopPropagation();goTo('test.html?id='+tid);};
  if(owner||isAdmin_){
    btns[bi++].onclick=(e)=>{e.stopPropagation();goTo('create.html?id='+tid);};
    btns[bi++].onclick=(e)=>{e.stopPropagation();delTest(tid);};
  }
  return el;
}

/* ════ MAIN LOAD ════ */
let CU=null,UID='',_myTests=[],_allResults=[];

(async()=>{
  CU=await AuthHelpers.requireAuth('login.html');
  if(!CU)return;
  UID=String(CU.id||CU.uid||CU._tg_id||'');
  const name=[CU.first_name,CU.last_name].filter(Boolean).join(' ')||CU.name||'Foydalanuvchi';

  let ud=null;
  try{ud=await DB.getUser(UID);}catch(e){}
  const isAdmin_=!!(ud?.is_admin||ud?.role==='admin');

  setAva('nav-ava',CU,name);
  setAva('p-ava',CU,name);
  document.getElementById('p-nm').textContent=name;
  document.getElementById('p-role').textContent=isAdmin_?'👑 Admin':'Foydalanuvchi';
  document.getElementById('greet-h').textContent='Salom, '+name.split(' ')[0]+'! 👋';

  if(isAdmin_){
    document.getElementById('admin-wrap').innerHTML=
      `<button class="ml" style="color:#d97706" onclick="closeMenu();goTo('admin.html')">
        <span class="mi">👑</span> Admin panel
      </button>`;
  }

  /* ── MENING TESTLARIM ── */
  const myWrap=document.getElementById('my-tests');
  try{
    _myTests=await DB.getMyTests(UID);
    document.getElementById('s-t').textContent=_myTests.length;
    if(!_myTests.length){
      myWrap.innerHTML=`<div class="emp">Test yaratilmagan.
        <br><button onclick="goTo('create.html')" style="color:var(--acc);font-weight:700;background:none;border:none;cursor:pointer;font-size:.8rem;margin-top:.3rem">✏️ Yaratish →</button>
      </div>`;
    } else {
      // Scroll ko'rinish (birinchi 5ta karta)
      renderMyTests(false);
      if(_myTests.length>1){
        const btn=document.getElementById('my-see-all');
        btn.style.display='';
        btn.onclick=()=>renderMyTests(true);
      }
    }
  }catch(e){myWrap.innerHTML=`<div class="err">❌ ${e.message}</div>`;}

  /* ── NATIJALAR ── */
  try{
    _allResults=await DB.getMyResults(UID,0);
    document.getElementById('s-d').textContent=_allResults.length;
    if(_allResults.length){
      const avg=Math.round(_allResults.reduce((s,r)=>s+(r.percentage||r.score||0),0)/_allResults.length);
      document.getElementById('s-a').textContent=avg+'%';
      document.getElementById('res-sec').style.display='block';
      renderResults(false);
      document.getElementById('res-see-all').onclick=()=>renderResults(true);
    }
  }catch(e){}

  /* ── OMMAVIY TESTLAR ── */
  const pubWrap=document.getElementById('pub-tests');
  try{
    const all=await DB.getPublicTests();
    const pub=(all||[]).filter(t=>t.visibility==='public');
    document.getElementById('pub-cnt').textContent=`(${pub.length})`;
    if(!pub.length){pubWrap.innerHTML='<div class="emp">Ommaviy test yo\'q</div>';return;}

    const grps={};
    pub.forEach(t=>{const k=t.category||t.subject||'other';if(!grps[k])grps[k]=[];grps[k].push(t);});

    pubWrap.innerHTML='';
    window._pubGrps=grps;
    renderPubGroups(pubWrap, grps);
  }catch(e){pubWrap.innerHTML=`<div class="err">❌ ${e.message}</div>`;}

})();

/* ── Mening testlarim render ── */
function renderMyTests(showAll){
  const wrap=document.getElementById('my-tests');
  const btn=document.getElementById('my-see-all');
  if(showAll){
    // Fanlar bo'yicha guruhlangan ko'rinish
    showMyCats(wrap, btn);
  } else {
    // Scroll karta ko'rinish
    wrap.innerHTML='';
    const scroll=document.createElement('div');scroll.className='scroll';
    _myTests.forEach(t=>scroll.appendChild(buildMyCard(t,!!(window._isAdmin))));
    wrap.appendChild(scroll);
    if(btn){btn.textContent='Barchasi →';btn.onclick=()=>renderMyTests(true);}
  }
}

/* ── Mening testlarim: fan kategoriyalari ── */
function showMyCats(wrap, btn){
  wrap.innerHTML='';
  // Fanlar bo'yicha guruhlash
  const grps={};
  _myTests.forEach(t=>{
    const k=t.category||t.subject||'other';
    if(!grps[k])grps[k]=[];
    grps[k].push(t);
  });

  Object.entries(grps).forEach(([cat,arr])=>{
    const sub=getSubject(cat);
    const icon=ICON[cat]||getIco(cat)||'📋';
    const g=document.createElement('div');g.className='grp';

    const hdr=document.createElement('div');hdr.className='grp-hdr';
    hdr.innerHTML=`
      <div class="grp-l">
        <div class="grp-icon">${icon}</div>
        <div>
          <div class="grp-nm">${esc(sub.label||cat)}</div>
          <div class="grp-ct">${arr.length} ta test</div>
        </div>
      </div>
      <button class="see-all">Ko'rish →</button>`;
    hdr.querySelector('.see-all').onclick=()=>showMyGroup(wrap, btn, cat, arr, icon, sub, grps);
    g.appendChild(hdr);

    const scroll=document.createElement('div');scroll.className='scroll';
    arr.forEach(t=>scroll.appendChild(buildMyCard(t,!!(window._isAdmin))));
    g.appendChild(scroll);
    wrap.appendChild(g);
  });

  // Orqaga tugma — pastda
  const back=document.createElement('button');
  back.className='back-btn';back.style.marginTop='.5rem';
  back.innerHTML='← Kartalar ko\'rinishi';
  back.onclick=()=>renderMyTests(false);
  wrap.appendChild(back);

  if(btn){btn.textContent='← Yopish';btn.onclick=()=>renderMyTests(false);}
}

/* ── Mening testlarim: bitta fan testlari ro'yxati ── */
function showMyGroup(wrap, btn, cat, arr, icon, sub, grps){
  wrap.innerHTML='';

  const hdr=document.createElement('div');hdr.className='grp-hdr';
  hdr.innerHTML=`
    <div class="grp-l">
      <div class="grp-icon">${icon}</div>
      <div>
        <div class="grp-nm">${esc(sub.label||cat)}</div>
        <div class="grp-ct">${arr.length} ta test</div>
      </div>
    </div>`;
  wrap.appendChild(hdr);

  arr.forEach(t=>wrap.appendChild(buildMyListItem(t,!!(window._isAdmin))));

  // Orqaga tugma — pastda
  const back=document.createElement('button');
  back.className='back-btn';back.style.marginTop='.5rem';
  back.innerHTML='← Barcha fanlar';
  back.onclick=()=>showMyCats(wrap, btn);
  wrap.appendChild(back);
}

/* ── Natijalar render ── */
function renderResults(showAll){
  const wrap=document.getElementById('res-list');
  const btn=document.getElementById('res-see-all');
  const list=showAll?_allResults:_allResults.slice(0,3);
  wrap.innerHTML='';
  list.forEach(r=>{
    const pct=Math.round(r.percentage||r.score||0);
    const cls=pct>=80?'sc-g':pct>=50?'sc-a':'sc-r';
    const d=r.completedAt?new Date(r.completedAt):null;
    const ds=d?d.toLocaleDateString('uz-UZ',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'}):'';
    const el=document.createElement('div');el.className='ri';
    el.innerHTML=`
      <div style="flex:1;min-width:0">
        <div class="ri-nm">${esc(r.testTitle||r.testId||'Test')}</div>
        <div class="ri-dt">${ds} · ${r.correct||0}/${r.total||0}</div>
      </div>
      <div class="ri-sc ${cls}">${pct}%</div>`;
    wrap.appendChild(el);
  });
  // Orqaga — pastda (faqat barchasi ochiq bo'lganda)
  if(showAll){
    const back=document.createElement('button');
    back.className='back-btn';back.style.marginTop='.5rem';
    back.innerHTML='← Yopish';
    back.onclick=()=>renderResults(false);
    wrap.appendChild(back);
  }
  if(btn){
    btn.textContent=showAll?'← Yopish':'Barchasi →';
    btn.onclick=()=>renderResults(!showAll);
  }
}

/* ── Ommaviy — fan ro'yxatini ko'rsatish ── */
function renderPubGroups(container, grps){
  container.innerHTML='';
  Object.entries(grps).forEach(([s,a])=>{
    const sb=getSubject(s);const ic=ICON[s]||getIco(s)||'📚';
    const g=document.createElement('div');g.className='grp';
    const h=document.createElement('div');h.className='grp-hdr';
    h.innerHTML=`
      <div class="grp-l">
        <div class="grp-icon">${ic}</div>
        <div>
          <div class="grp-nm">${esc(sb.label)}</div>
          <div class="grp-ct">${a.length} ta test</div>
        </div>
      </div>
      <button class="see-all">Barchasi →</button>`;
    h.querySelector('.see-all').onclick=()=>showPubList(container,s,a,ic,sb,grps);
    g.appendChild(h);
    const sc=document.createElement('div');sc.className='scroll';
    a.forEach(t=>sc.appendChild(buildCard(t,ic)));g.appendChild(sc);
    container.appendChild(g);
  });
}

function showPubList(container, subj, arr, icon, sub, grps){
  container.innerHTML='';

  const hdr=document.createElement('div');hdr.className='grp-hdr';
  hdr.innerHTML=`
    <div class="grp-l">
      <div class="grp-icon">${icon}</div>
      <div>
        <div class="grp-nm">${esc(sub.label)}</div>
        <div class="grp-ct">${arr.length} ta test</div>
      </div>
    </div>`;
  container.appendChild(hdr);

  arr.forEach(t=>container.appendChild(buildListItem(t,icon)));

  // Orqaga tugma — pastda
  const back=document.createElement('button');
  back.className='back-btn';back.style.marginTop='.5rem';
  back.innerHTML='← Orqaga';
  back.onclick=()=>renderPubGroups(container,grps);
  container.appendChild(back);
}

<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>TestPro — Profil</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#EEF0FF;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--text3:#9ca3af;--acc:#6C3FE8;--acc2:#C040C8;--border:rgba(108,63,232,.1);--shadow:0 2px 10px rgba(108,63,232,.07);--green:#059669;--red:#ef4444}
[data-theme=dark]{--bg:#0d0820;--card:#140d28;--text:#e8e0ff;--text2:#9ca3af;--text3:#6b7280;--border:rgba(108,63,232,.2);--shadow:0 2px 12px rgba(0,0,0,.35)}
body{font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;background:var(--bg);color:var(--text)}
.nav{position:fixed;top:0;left:0;right:0;height:54px;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;background:var(--bg);border-bottom:1px solid var(--border)}
.logo{font-family:'Unbounded',sans-serif;font-size:1.05rem;font-weight:900;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-r{display:flex;align-items:center;gap:.4rem}
.ibtn{width:34px;height:34px;border-radius:99px;border:none;cursor:pointer;font-size:.88rem;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;color:var(--text)}
[data-theme=dark] .ibtn{background:rgba(255,255,255,.1)}
.bbtn{padding:.38rem .82rem;border-radius:99px;font-size:.78rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:rgba(255,255,255,.8);color:var(--text2)}
[data-theme=dark] .bbtn{background:rgba(255,255,255,.1)}

.page{padding:70px 1rem 3rem;max-width:500px;margin:0 auto}

/* HERO */
.hero{background:var(--card);border-radius:20px;padding:1.5rem 1rem;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:.85rem}
.ava-wrap{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:2rem;font-weight:900;color:#fff;margin:0 auto .9rem;overflow:hidden;box-shadow:0 8px 24px rgba(108,63,232,.3)}
.ava-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-name{font-family:'Unbounded',sans-serif;font-size:.95rem;font-weight:900;margin-bottom:.18rem}
.hero-un{font-size:.78rem;color:var(--text3)}
.badge-admin{display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .65rem;border-radius:99px;font-size:.68rem;font-weight:700;background:rgba(245,158,11,.1);color:#d97706;border:1px solid rgba(245,158,11,.25);margin:.45rem auto 0;cursor:default}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;margin-bottom:.85rem}
.sb{background:var(--card);border-radius:14px;padding:.75rem .4rem;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.sv{font-family:'Unbounded',sans-serif;font-size:1.15rem;font-weight:900;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-top:.08rem}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.15rem;margin-bottom:.75rem;box-shadow:var(--shadow)}
.card-h{font-size:.86rem;font-weight:800;margin-bottom:.9rem;display:flex;align-items:center;gap:.35rem}

/* INFO ROWS */
.info-row{display:flex;align-items:center;gap:.6rem;padding:.62rem 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none;padding-bottom:0}
.ir-ico{font-size:1rem;width:24px;text-align:center;flex-shrink:0}
.ir-lbl{font-size:.72rem;color:var(--text3);font-weight:600;min-width:80px}
.ir-val{font-size:.84rem;font-weight:700;flex:1}

/* BUTTONS */
.btn-pr{width:100%;padding:.72rem;border-radius:13px;border:none;cursor:pointer;font-family:'Unbounded',sans-serif;font-size:.82rem;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--acc),var(--acc2));margin-bottom:.5rem;transition:all .2s}
.btn-pr:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(108,63,232,.3)}
.btn-d{width:100%;padding:.72rem;border-radius:13px;border:1.5px solid rgba(239,68,68,.25);background:rgba(239,68,68,.06);cursor:pointer;color:var(--red);font-weight:800;font-size:.82rem;font-family:inherit;margin-bottom:.45rem;transition:all .2s}
.btn-d:hover{background:rgba(239,68,68,.12)}
.btn-s{width:100%;padding:.65rem;border-radius:13px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;color:var(--text2);font-weight:700;font-size:.82rem;font-family:inherit;margin-bottom:.45rem;transition:all .2s}
.btn-s:hover{border-color:rgba(108,63,232,.3);color:var(--acc)}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:.6rem 1.3rem;border-radius:12px;font-size:.82rem;font-weight:700;z-index:9999;transition:transform .3s;white-space:nowrap;pointer-events:none}
[data-theme=dark] .toast{background:rgba(232,224,255,.95);color:#1a1a2e}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo" onclick="goTo('index.html')">TestPro</div>
  <div class="nav-r">
    <button class="bbtn" onclick="goTo('dashboard.html')">← Dashboard</button>
    <button class="ibtn" id="tbtn">🌙</button>
  </div>
</nav>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="ava-wrap" id="ava-el">?</div>
    <div class="hero-name" id="hero-name">Yuklanmoqda...</div>
    <div class="hero-un" id="hero-un"></div>
    <div id="admin-badge" style="display:none" class="badge-admin">👑 Admin</div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="sb"><div class="sv" id="st-t">—</div><div class="sl">Testlar</div></div>
    <div class="sb"><div class="sv" id="st-d">—</div><div class="sl">Ishlangan</div></div>
    <div class="sb"><div class="sv" id="st-a">—</div><div class="sl">O'rtacha</div></div>
  </div>

  <!-- TG INFO -->
  <div class="card">
    <div class="card-h">ℹ️ Telegram ma'lumotlar</div>
    <div class="info-row"><span class="ir-ico">🆔</span><span class="ir-lbl">Telegram ID</span><span class="ir-val" id="inf-id">—</span></div>
    <div class="info-row"><span class="ir-ico">📛</span><span class="ir-lbl">Ism</span><span class="ir-val" id="inf-name">—</span></div>
    <div class="info-row"><span class="ir-ico">📱</span><span class="ir-lbl">Username</span><span class="ir-val" id="inf-un">—</span></div>
    <div class="info-row"><span class="ir-ico">📅</span><span class="ir-lbl">Kirgan</span><span class="ir-val" id="inf-date">—</span></div>
  </div>

  <!-- QUICK NAV -->
  <div class="card">
    <div class="card-h">⚡ Tezkor harakatlar</div>
    <button class="btn-pr" onclick="goTo('create.html')">✏️ Yangi test yaratish</button>
    <button class="btn-s" onclick="goTo('dashboard.html')">📋 Dashboard</button>
    <button class="btn-s" onclick="goTo('history.html')">📜 Natijalar tarixi</button>
    <div id="admin-btn-wrap"></div>
  </div>

  <!-- DANGER ZONE -->
  <div class="card">
    <div class="card-h">⚠️ Xavfli zona</div>
    <button class="btn-s" onclick="clearCache()">🗑 Keshni tozalash</button>
    <button class="btn-s" onclick="clearHist()">📜 Tarixni tozalash</button>
    <button class="btn-d" onclick="doLogout()">🚪 Hisobdan chiqish</button>
  </div>

</div>

<div class="toast" id="toast"></div>
<script src="js/api.js"></script>
<script>
if(typeof normalizeQ==='undefined'){window.normalizeQ=function(arr){return(arr||[]).map(q=>{const type=q.type==='multiple_choice'?'multiple':q.type==='true_false'?'truefalse':q.type||'multiple';const text=q.text||q.question||q.q||'';const options=(q.options||[]).map(o=>String(o));let correct=0;if(typeof q.correct==='number'){correct=q.correct;}else if(typeof q.correct==='string'){const idx=options.findIndex(o=>o===q.correct||o.trim()===q.correct.trim());correct=idx>=0?idx:0;}return{...q,type,text,options,correct,explanation:q.explanation||'',points:q.points||1};});};}
if(typeof esc==='undefined'){window.esc=function(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;};}
if(typeof fmtTime==='undefined'){window.fmtTime=function(s){s=s||0;return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');};}
if(typeof fmtDate==='undefined'){window.fmtDate=function(ts){if(!ts)return'—';try{const ms=(typeof ts==='number'&&ts<1e12)?ts*1000:ts;return new Date(ms).toLocaleDateString('uz-UZ',{day:'numeric',month:'short',year:'numeric'});}catch{return'—';}}}
if(typeof getSubject==='undefined'){const _S={english:{label:'English',emoji:'🇬🇧'},arabic:{label:'Arabcha',emoji:'🕌'},russian:{label:'Ruscha',emoji:'🇷🇺'},turkish:{label:'Turkcha',emoji:'🇹🇷'},uzbek:{label:"O'zbekcha",emoji:'🇺🇿'},math:{label:'Matematika',emoji:'🧮'},it:{label:'IT/CS',emoji:'💻'},science:{label:'Fanlar',emoji:'🔬'},religion:{label:'Din',emoji:'📖'},history:{label:'Tarix',emoji:'🏛️'},biology:{label:'Biologiya',emoji:'🧬'},chemistry:{label:'Kimyo',emoji:'⚗️'},physics:{label:'Fizika',emoji:'⚡'},literature:{label:'Adabiyot',emoji:'✍️'},sport:{label:'Sport',emoji:'⚽'},other:{label:'Boshqa',emoji:'📚'}};window.getSubject=function(k){if(!k)return _S.other;const l=k.toLowerCase().replace(/[\s\-_]/g,'');if(_S[l])return _S[l];const f=Object.entries(_S).find(([x])=>l.includes(x));return f?f[1]:{label:k,emoji:'📚'};};window.getIco=function(s){if(!s)return'📚';const k=(s||'').toLowerCase().replace(/[\s\-_]/g,'');const I={english:'🇬🇧',arabic:'🕌',russian:'🇷🇺',turkish:'🇹🇷',uzbek:'🇺🇿',math:'🧮',it:'💻',science:'🔬',religion:'📖',history:'🏛️',biology:'🧬',chemistry:'⚗️',physics:'⚡',literature:'✍️',sport:'⚽',other:'📚'};return I[k]||Object.entries(I).find(([x])=>k.includes(x))?.[1]||'📚';};}
if(typeof goTo==='undefined'){const _B=(()=>{const p=window.location.pathname;const i=p.lastIndexOf('/');return i>0?p.slice(0,i+1):'/'})();window.goTo=function(page){window.location.href=_B+page;};}
</script>
<script>
const TH={get(){return localStorage.getItem('tp_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')},set(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('tp_theme',t);document.getElementById('tbtn').textContent=t==='dark'?'☀️':'🌙'},toggle(){this.set(this.get()==='dark'?'light':'dark')}};
TH.set(TH.get());document.getElementById('tbtn').onclick=()=>TH.toggle();

let _tt;
function toast(m,d=2500){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),d);}

(async()=>{
  const u=await AuthHelpers.requireAuth('login.html');
  if(!u)return;

  const uid=String(u.id||u.uid||u._tg_id||'');
  const name=[u.first_name,u.last_name].filter(Boolean).join(' ')||u.name||'Foydalanuvchi';
  const un=u.username?'@'+u.username:'';

  // Avatar
  const avaEl=document.getElementById('ava-el');
  if(u.photo_url){
    const img=document.createElement('img');img.src=u.photo_url;avaEl.innerHTML='';avaEl.appendChild(img);
  }else{
    avaEl.textContent=(name[0]||'?').toUpperCase();
  }
  document.getElementById('hero-name').textContent=name;
  document.getElementById('hero-un').textContent=un||('ID: '+uid);
  document.getElementById('inf-id').textContent=uid;
  document.getElementById('inf-name').textContent=name;
  document.getElementById('inf-un').textContent=un||'—';
  document.getElementById('inf-date').textContent=u._at?new Date(u._at).toLocaleDateString('uz-UZ',{day:'numeric',month:'long',year:'numeric'}):'—';

  // Admin check
  try{
    const ud=await DB.getUser(uid);
    const isAdmin=!!(ud?.is_admin||ud?.role==='admin');
    if(isAdmin){
      document.getElementById('admin-badge').style.display='inline-flex';
      document.getElementById('admin-btn-wrap').innerHTML='<button class="btn-pr" style="background:linear-gradient(135deg,#d97706,#f59e0b);margin-top:.1rem" onclick="goTo(\'admin.html\')">👑 Admin panel</button>';
    }
  }catch{}

  // Stats
  try{
    const [myTests,results]=await Promise.all([DB.getMyTests(uid),DB.getMyResults(uid,0)]);
    document.getElementById('st-t').textContent=myTests.length;
    document.getElementById('st-d').textContent=results.length;
    if(results.length){
      const avg=Math.round(results.reduce((s,r)=>s+(r.percentage||r.score||0),0)/results.length);
      document.getElementById('st-a').textContent=avg+'%';
    }
  }catch{}
})();

function clearCache(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('tp_test_')||k.startsWith('tp_ans_'));
  keys.forEach(k=>localStorage.removeItem(k));
  toast(`✅ ${keys.length} ta kesh tozalandi`);
}

function clearHist(){
  if(!confirm('Barcha natijalar tarixini tozalashni xohlaysizmi?'))return;
  localStorage.removeItem('tp_results');
  toast('🗑 Tarix tozalandi');
}

function doLogout(){
  if(!confirm('Hisobdan chiqmoqchimisiz?'))return;
  TGAuth.clear();
  goTo('login.html');
}
</script>
</body>
</html>

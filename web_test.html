<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
<title>TestPro — Web Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
<style>
  /* ════════════════════════════════════════════════
     TestPro — Premium Elegant Pro Theme
     Sapphire academic glassmorphism + light motion
     (struktura/JS/class/id oʻzgarmagan, faqat dizayn)
  ════════════════════════════════════════════════ */
  :root{
    --ink:#101a33;
    --ink-soft:#33446b;
    --ink-mute:#6a7fa8;
    --sapphire:#3461d6;
    --sapphire-lo:#5b8cf5;
    --sapphire-hi:#7fb0ff;
    --glass:rgba(255,255,255,0.40);
    --glass-2:rgba(255,255,255,0.52);
    --glass-line:rgba(150,185,255,0.45);
    --ok:#0fa968;
    --ok-deep:#0a7a4b;
    --bad:#e23b4e;
    --bad-deep:#a51d2c;
    --gold:#d9a341;
    --shadow:0 10px 34px rgba(40,78,170,0.16);
    --shadow-sm:0 4px 16px rgba(40,78,170,0.12);
    --ease:cubic-bezier(.34,1.32,.55,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html{ scroll-behavior:smooth; }

  /* ──────────────────────────────────────────────
     PERFORMANCE MODE — Telegram Mini App / kuchsiz qurilmalar uchun.
     JS body ga "perf" klassini qo'yadi (Telegram.WebApp aniqlanса
     yoki qurilma sust bo'lsa). Bunda blur/animation o'chadi —
     dizayn deyarli bir xil ko'rinadi, lekin GPU yuklamasi yo'qoladi.
     ────────────────────────────────────────────── */
  body.perf *{
    backdrop-filter:none !important;
    -webkit-backdrop-filter:none !important;
  }
  /* perf rejimda faqat og'ir GPU effektlarni o'chiramiz, animatsiyalar ishlayveradi */
  body.perf::before, body.perf::after{ display:none !important; }
  body.perf .top-bar, body.perf .timer-box, body.perf .progress-wrap,
  body.perf .subject-card, body.perf .question-card, body.perf .opt,
  body.perf .result-screen, body.perf #bottom-stats{
    background:rgba(255,255,255,0.94) !important;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    background:
      radial-gradient(1100px 620px at 18% -8%, rgba(127,176,255,0.42), transparent 60%),
      radial-gradient(900px 560px at 92% 8%, rgba(146,120,255,0.30), transparent 58%),
      linear-gradient(168deg, rgba(234,241,252,0.92) 0%, rgba(221,232,251,0.92) 46%, rgba(230,236,250,0.92) 100%),
      var(--bg-image) center/cover no-repeat fixed;
    background-color: #e7eefb;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 26px;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient floating glow — light motion */
  body::before,
  body::after{
    content:"";
    position:fixed;
    border-radius:50%;
    filter:blur(60px);
    z-index:0;
    pointer-events:none;
    opacity:.55;
  }
  body::before{
    width:340px;height:340px;left:-90px;top:8%;
    background:radial-gradient(circle, rgba(91,140,245,0.55), transparent 70%);
    animation:floatA 16s ease-in-out infinite;
  }
  body::after{
    width:300px;height:300px;right:-80px;top:52%;
    background:radial-gradient(circle, rgba(150,110,240,0.45), transparent 70%);
    animation:floatB 19s ease-in-out infinite;
  }
  @keyframes floatA{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(34px,46px) scale(1.12)}
  }
  @keyframes floatB{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(-40px,-36px) scale(1.08)}
  }

  /* hidden academic seal background (subtle) */
  .top-bar, .subject-card, .question-card, .options-wrap,
  .bottom-nav, .result-screen, #bottom-stats { position:relative; z-index:1; }

  /* page-load entrance */
  @keyframes riseIn{
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* ===== HEADER ===== */
  .top-bar {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: stretch;
    gap: 10px;
    padding: 16px 16px 0;
    animation:riseIn .55s var(--ease) both;
  }
  .prog-box {
    background: var(--glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-line);
    border-radius: 16px;
    padding: 0 16px;
    flex: 1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:7px;
    box-shadow: var(--shadow-sm);
  }
  .prog-box::before{
    content:"JARAYON";
    font-size:8.5px;
    font-weight:800;
    letter-spacing:2.4px;
    color:var(--ink-mute);
  }
  .prog-bar-track {
    height: 8px;
    background: rgba(120,155,225,0.22);
    border-radius: 99px;
    overflow: hidden;
    position:relative;
  }
  .prog-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sapphire), var(--sapphire-hi));
    border-radius: 99px;
    transition: width 0.6s var(--ease);
    position:relative;
    overflow:hidden;
  }
  /* shimmer sweep over progress — light motion */
  .prog-bar-fill::after{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(100deg, transparent 20%, rgba(255,255,255,.65) 50%, transparent 80%);
    transform:translateX(-100%);
    animation:shimmer 2.4s ease-in-out infinite;
  }
  @keyframes shimmer{ to{ transform:translateX(100%);} }

  .timer-box {
    background: var(--glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-line);
    border-radius: 16px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
    white-space: nowrap;
  }
  .timer-icon { font-size: 17px; filter:drop-shadow(0 1px 2px rgba(52,97,214,.35)); }
  .timer-text {
    font-size: 19px;
    font-weight: 800;
    color: var(--sapphire);
    letter-spacing: .6px;
    font-variant-numeric: tabular-nums;
    transition: color .3s;
  }
  .timer-text.warning { color: var(--bad); animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:0.55; transform:scale(1.06)} }

  .stats-box {
    background: var(--glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-line);
    border-radius: 16px;
    padding: 9px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    justify-content:center;
    box-shadow: var(--shadow-sm);
    min-width: 104px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--ink-mute);
    font-weight: 600;
  }
  .stat-icon { font-size: 13px; }
  .stat-val { font-weight: 800; color: var(--ink); margin-left:auto; }

  /* ===== SUBJECT TITLE ===== */
  .subject-card {
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 14px 16px 0;
    background: linear-gradient(135deg, rgba(52,97,214,0.14), rgba(127,176,255,0.10)), var(--glass-2);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--glass-line);
    border-radius: 20px;
    padding: 18px 22px;
    text-align: center;
    box-shadow: var(--shadow);
    animation:riseIn .6s .06s var(--ease) both;
    position:relative;
    overflow:hidden;
  }
  .subject-card::before{
    content:"";
    position:absolute;left:0;top:0;width:100%;height:3px;
    background:linear-gradient(90deg, var(--sapphire), var(--gold), var(--sapphire));
    background-size:200% 100%;
    animation:slideGrad 5s linear infinite;
  }
  @keyframes slideGrad{ to{ background-position:200% 0; } }
  .subject-title {
    font-size: 10px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.32;
    letter-spacing:-.2px;
  }

  /* ===== QUESTION ===== */
  .question-card {
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 14px 16px 0;
    background: var(--glass-2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-line);
    border-radius: 22px;
    padding: 28px 24px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    animation: cardSwap .42s var(--ease) both;
  }
  @keyframes cardSwap{
    from{opacity:0; transform:translateY(14px) scale(.985)}
    to{opacity:1; transform:translateY(0) scale(1)}
  }
  .q-number {
    display:inline-block;
    font-size: 10.5px;
    font-weight: 800;
    color: var(--sapphire);
    letter-spacing: 2.6px;
    text-transform: uppercase;
    margin-bottom: 14px;
    padding:5px 13px;
    border-radius:99px;
    background:rgba(52,97,214,0.10);
    border:1px solid rgba(52,97,214,0.18);
  }
  .question-text {
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.62;
    letter-spacing:-.1px;
  }

  /* ===== OPTIONS ===== */
  .options-wrap {
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 12px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  /* ── Izoh bloki — javob berilgandan keyin variantlar ostida ── */
  .answer-explain{
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 4px 16px 0;
    padding: 13px 16px;
    border-radius: 14px;
    background: rgba(91,140,245,0.10);
    border: 1.4px solid rgba(91,140,245,0.28);
    border-left: 4px solid var(--sapphire);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink-soft);
    animation: explFade .35s var(--ease) both;
  }
  @keyframes explFade{
    from{opacity:0; transform:translateY(-6px)}
    to{opacity:1; transform:translateY(0)}
  }
  .answer-explain-ic{ flex-shrink:0; font-size:16px; line-height:1.4; }
  .answer-explain-tx{ flex:1; word-break:break-word; }
  body.perf .answer-explain{ animation:none !important; }

  .option {
    background: var(--glass-2);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.6px solid var(--glass-line);
    border-radius: 16px;
    padding: 16px 18px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    font-size: 15.5px;
    font-weight: 600;
    color: var(--ink-soft);
    transition: transform .18s var(--ease), background .2s, border-color .2s, box-shadow .25s;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-sm);
    position:relative;
    overflow:visible;
    animation: optIn .4s var(--ease) both;
  }
  /* staggered option entrance */
  .options-wrap .option:nth-child(1){ animation-delay:.04s }
  .options-wrap .option:nth-child(2){ animation-delay:.10s }
  .options-wrap .option:nth-child(3){ animation-delay:.16s }
  .options-wrap .option:nth-child(4){ animation-delay:.22s }
  .options-wrap .option:nth-child(5){ animation-delay:.28s }
  .options-wrap .option:nth-child(6){ animation-delay:.34s }
  @keyframes optIn{
    from{opacity:0; transform:translateX(-12px)}
    to{opacity:1; transform:translateX(0)}
  }
  .option:hover:not(:disabled){
    background: rgba(232,241,255,0.92);
    border-color: rgba(52,97,214,0.55);
    transform: translateY(-2px);
    box-shadow: 0 10px 26px rgba(52,97,214,0.24);
  }
  .option:active:not(:disabled){ transform:translateY(0) scale(.99); }

  .option.selected {
    background: rgba(52,97,214,0.13);
    border-color: rgba(52,97,214,0.7);
    color: var(--ink);
  }

  /* ✓ CORRECT — success burst animation */
  .option.correct {
    background: linear-gradient(135deg, rgba(15,169,104,0.18), rgba(15,169,104,0.08));
    border-color: rgba(15,169,104,0.75);
    color: var(--ok-deep);
    animation: correctPop .6s var(--ease) both;
    box-shadow: 0 0 0 rgba(15,169,104,0.5);
  }
  @keyframes correctPop{
    0%{ transform:scale(1); box-shadow:0 0 0 0 rgba(15,169,104,0.5) }
    35%{ transform:scale(1.035) }
    70%{ box-shadow:0 0 0 12px rgba(15,169,104,0) }
    100%{ transform:scale(1); box-shadow:0 6px 22px rgba(15,169,104,0.28) }
  }
  /* glowing left bar on correct */
  .option.correct::before{
    content:"";
    position:absolute;left:0;top:0;bottom:0;width:4px;
    background:var(--ok);
    box-shadow:0 0 12px rgba(15,169,104,.8);
  }

  /* ✗ WRONG — shake animation */
  .option.wrong {
    background: linear-gradient(135deg, rgba(226,59,78,0.14), rgba(226,59,78,0.06));
    border-color: rgba(226,59,78,0.65);
    color: var(--bad-deep);
    animation: wrongShake .5s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes wrongShake{
    10%,90%{ transform:translateX(-2px) }
    20%,80%{ transform:translateX(4px) }
    30%,50%,70%{ transform:translateX(-7px) }
    40%,60%{ transform:translateX(7px) }
  }
  .option.wrong::before{
    content:"";
    position:absolute;left:0;top:0;bottom:0;width:4px;
    background:var(--bad);
    box-shadow:0 0 12px rgba(226,59,78,.7);
  }

  .option-radio {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(52,97,214,0.5);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s var(--ease);
    background:rgba(255,255,255,0.5);
  }
  .option.correct .option-radio {
    border-color: var(--ok); background: var(--ok);
    box-shadow:0 0 14px rgba(15,169,104,.6);
    animation:radioPunch .45s var(--ease) both;
  }
  .option.wrong .option-radio {
    border-color: var(--bad); background: var(--bad);
    box-shadow:0 0 14px rgba(226,59,78,.55);
    animation:radioPunch .45s var(--ease) both;
  }
  .option.selected .option-radio { border-color: var(--sapphire); background: var(--sapphire); }
  @keyframes radioPunch{
    0%{ transform:scale(.4); opacity:0 }
    60%{ transform:scale(1.18) }
    100%{ transform:scale(1); opacity:1 }
  }
  .radio-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: white;
    display: none;
  }
  .option.selected .radio-dot,
  .option.correct .radio-dot,
  .option.wrong .radio-dot { display: block; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 18px 16px 0;
    display: flex;
    gap: 10px;
  }
  .nav-btn {
    flex: 1;
    background: var(--glass-2);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1.6px solid var(--glass-line);
    border-radius: 15px;
    padding: 15px 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
    transition: transform .18s var(--ease), background .2s, box-shadow .25s, border-color .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: var(--shadow-sm);
  }
  .nav-btn:hover:not(:disabled){
    background: rgba(232,241,255,0.95);
    border-color: rgba(52,97,214,0.5);
    transform: translateY(-2px);
    box-shadow:0 8px 22px rgba(52,97,214,.2);
  }
  .nav-btn:active:not(:disabled){ transform:translateY(0) scale(.98); }
  .nav-btn.finish {
    background: linear-gradient(135deg, var(--sapphire), var(--sapphire-lo));
    color: white;
    border-color: transparent;
    box-shadow: 0 6px 20px rgba(52,97,214,0.42);
  }
  .nav-btn.finish:hover:not(:disabled){ box-shadow: 0 10px 30px rgba(52,97,214,0.58); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow:none; }

  /* ===== RESULT ===== */
  .result-screen {
    display: none;
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 22px 16px 0;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .result-card {
    width: 100%;
    background: var(--glass-2);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border:1px solid var(--glass-line);
    border-radius: 26px;
    padding: 38px 28px;
    text-align: center;
    box-shadow: 0 16px 50px rgba(40,78,170,0.2);
    animation: resultRise .6s var(--ease) both;
    position:relative;
    overflow:hidden;
  }
  @keyframes resultRise{
    from{opacity:0; transform:translateY(26px) scale(.96)}
    to{opacity:1; transform:translateY(0) scale(1)}
  }
  .result-card::before{
    content:"";
    position:absolute;left:0;top:0;width:100%;height:4px;
    background:linear-gradient(90deg, var(--sapphire), var(--gold), var(--ok));
    background-size:200% 100%;
    animation:slideGrad 4s linear infinite;
  }
  .result-icon {
    font-size: 74px;
    margin-bottom: 10px;
    animation: trophyPop .7s var(--ease) both, floatY 3s ease-in-out 1s infinite;
    filter:drop-shadow(0 6px 14px rgba(52,97,214,.3));
  }
  @keyframes trophyPop{
    0%{ transform:scale(0) rotate(-25deg); opacity:0 }
    60%{ transform:scale(1.2) rotate(8deg) }
    100%{ transform:scale(1) rotate(0); opacity:1 }
  }
  @keyframes floatY{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .result-score {
    font-size: 54px;
    font-weight: 900;
    background:linear-gradient(135deg, var(--sapphire), var(--sapphire-hi));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    line-height: 1;
    letter-spacing:-1px;
  }
  .result-label { font-size: 12px; color: var(--ink-mute); margin: 8px 0 22px; letter-spacing: 2px; font-weight:700; }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .r-stat {
    background: rgba(238,245,255,0.82);
    border:1px solid rgba(150,185,255,0.3);
    border-radius: 15px;
    padding: 15px 8px;
    transition:transform .2s var(--ease);
  }
  .r-stat:hover{ transform:translateY(-3px); }
  .r-stat-val { font-size: 23px; font-weight: 800; color: var(--sapphire); }
  .r-stat-lbl { font-size: 10px; color: var(--ink-mute); margin-top: 5px; font-weight: 600; }
  .result-msg { font-size: 15px; color: var(--ink-soft); margin-bottom: 22px; line-height: 1.55; font-weight:600; }
  .restart-btn {
    padding: 15px 20px;
    background: linear-gradient(135deg, var(--sapphire), var(--sapphire-lo));
    border: none;
    border-radius: 14px;
    color: white;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(52,97,214,0.42);
    transition: transform .2s var(--ease), box-shadow .25s;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(52,97,214,0.55); }
  .restart-btn:active { transform: translateY(0) scale(.98); }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.05ms !important; }
    body::before, body::after{ animation:none; }
  }

  /* ════ Konteyner cheti boʻylab aylanib yonuvchi yorugʻlik ════ */
  @property --fxAngle{ syntax:'<angle>'; initial-value:0deg; inherits:false; }
  .fx-glow{ position:relative;
    --fxLight:#fff;
    --fxMid:var(--sapphire-hi);
    --fxDeep:var(--sapphire);
  }
  .fx-glow::after{
    content:"";
    position:absolute; inset:-1.5px;
    border-radius:inherit;
    padding:1.5px;
    background:conic-gradient(from var(--fxAngle),
      transparent 0deg,
      transparent 60deg,
      var(--fxMid) 110deg,
      var(--fxLight) 130deg,
      var(--fxDeep) 150deg,
      transparent 200deg,
      transparent 360deg);
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask-composite:exclude;
    animation:fxSpin 4s linear infinite;
    pointer-events:none;
    z-index:3;
  }
  @keyframes fxSpin{ to{ --fxAngle:360deg; } }
  /* tezligi har bir konteyner uchun biroz farqli — jonliroq */
  .subject-card.fx-glow::after{ animation-duration:5s; }
  .question-card.fx-glow::after{ animation-duration:4.2s; }

  #scr-load{

<script>

/* ═══════════════════════════════════════════
   WEB TEST — quiz_graduate dizayni + Bot API
═══════════════════════════════════════════ */

/* ── Loading matnini harf-harf jonlantirish ── */
(function(){
  const t=document.getElementById('loadTxt');
  if(!t)return;
  const word='YUKLANMOQDA';
  t.innerHTML=word.split('').map((c,i)=>`<span style="animation-delay:${i*0.08}s">${c}</span>`).join('');
})();

/* ════ Konfetti effekti — CSS div, canvas yo'q, yengil va tez ════ */
function fxConfettiBurst(){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  const COL=['#0fa968','#3461d6','#7fb0ff','#d9a341','#e23b4e','#7c45e0','#fff','#5fe0a8','#ffca28','#ff8a96'];
  const N=55, frag=document.createDocumentFragment();
  const ox=innerWidth/2, oy=innerHeight*0.42;
  for(let k=0;k<N;k++){
    const d=document.createElement('div');
    const ang=Math.random()*360;
    const dist=80+Math.random()*220;
    const tx=Math.cos(ang*Math.PI/180)*dist;
    const ty=Math.sin(ang*Math.PI/180)*dist - (120+Math.random()*160);
    const dur=0.55+Math.random()*0.35;
    const delay=Math.random()*0.12;
    const isRect=Math.random()<0.6;
    const size=(isRect?''+(5+Math.random()*6|0)+'px '+(7+Math.random()*7|0)+'px':''+(5+Math.random()*6|0)+'px');
    d.style.cssText=
      'position:fixed;pointer-events:none;z-index:9999;'+
      'left:'+ox+'px;top:'+oy+'px;'+
      (isRect
        ? 'width:'+(5+Math.random()*6|0)+'px;height:'+(7+Math.random()*7|0)+'px;border-radius:2px;'
        : 'width:'+(5+Math.random()*6|0)+'px;height:'+(5+Math.random()*6|0)+'px;border-radius:50%;' )+
      'background:'+COL[Math.random()*COL.length|0]+';'+
      'animation:_cfBurst '+dur+'s '+delay+'s cubic-bezier(.2,.8,.4,1) both;'+
      '--tx:'+tx+'px;--ty:'+ty+'px;'+
      '--rot:'+(Math.random()*540-270)+'deg;';
    frag.appendChild(d);
  }
  document.body.appendChild(frag);
  setTimeout(()=>{
    document.querySelectorAll('div[style*=_cfBurst]').forEach(e=>e.remove());
    // fallback: hamma qolganlarni ham tozala
    document.querySelectorAll('div[style*=--tx]').forEach(e=>e.remove());
  }, 1100);
}

const LBL = ['A','B','C','D','E','F','G','H','I','J'];
const API  = '/api/proxy';
const P    = new URLSearchParams(location.search);
const TID  = (P.get('id') || '').trim().toUpperCase();
const DEMO = P.get('demo') === '1';
const DMAX = 20;
const UID  = P.get('uid') || '';
const UNAME= P.get('name') || ('User'+UID);
const UUN  = P.get('uname') || '';

let qs=[], meta=null, answers=[], cur=0;
let t0=0, tmr=null, att=0, cor=0, finished=false;

const $= id => document.getElementById(id);

/* ──────────────────────────────────────────────
   TELEGRAM MINI APP — aniqlash va tezkor sozlash
   ────────────────────────────────────────────── */
const TG = window.Telegram && window.Telegram.WebApp;
if(TG){
  try{
    TG.ready();
    TG.expand();
    document.body.classList.add('perf');           // og'ir effektlarni o'chiramiz
    if(TG.setHeaderColor) TG.setHeaderColor('#eaf1fc');
    if(TG.disableVerticalSwipes) TG.disableVerticalSwipes();
  }catch{}
}
/* Sust qurilma/eski browser — backdrop-filter qo'llamasa ham perf yoqamiz */
if(!CSS.supports('backdrop-filter','blur(1px)') && !CSS.supports('-webkit-backdrop-filter','blur(1px)')){
  document.body.classList.add('perf');
}

/* Cache — localStorage Telegram WebView'da ishonchsiz,
   shuning uchun tezkor xotira (Map) BIRINCHI darajali cache,
   localStorage esa faqat ikkinchi (sahifa qayta ochilganda) ishlatiladi. */
const _mem = new Map();
function _ck(t){return'tp_test_'+t}
function _cs(t,d){
  _mem.set(t,{d,ts:Date.now()});
  try{localStorage.setItem(_ck(t),JSON.stringify({d,ts:Date.now()}))}catch{}
}
function _cl(t){
  const m=_mem.get(t);
  if(m && Date.now()-m.ts<86400000) return m.d;
  try{
    const r=localStorage.getItem(_ck(t));
    if(!r)return null;
    const{d,ts}=JSON.parse(r);
    if(Date.now()-ts<86400000){_mem.set(t,{d,ts});return d}
    localStorage.removeItem(_ck(t));
    return null;
  }catch{return null}
}

function fmt(s){s=Math.max(0,s|0);const h=(s/3600)|0,m=((s%3600)/60)|0,sc=s%60;if(h>0)return[h,m,sc].map(v=>String(v).padStart(2,'0')).join(':');return[m,sc].map(v=>String(v).padStart(2,'0')).join(':')}

function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}

function norm(raw){
  return(raw||[]).map(q=>{
    const txt=q.text||q.question||q.q||'';
    const opts=(q.options||[]).map(o=>String(o).replace(/^[A-J]\s*[).]\s*/i,'').trim());
    let correct=0;
    if(typeof q.correct==='number'){correct=q.correct}
    else if(typeof q.correct==='string'){
      const m=q.correct.match(/^([A-J])\s*[).]/i);
      if(m)correct=m[1].toUpperCase().charCodeAt(0)-65;
      else{const c=q.correct.replace(/^[A-J]\s*[).]\s*/i,'').trim();const i=opts.findIndex(o=>o===c||o.includes(c)||c.includes(o));correct=i>=0?i:0}
    }
    return{txt,opts,correct,expl:q.explanation||'',photo:q.photo||null,img:q.image||null};
  }).filter(q=>q.txt&&q.opts.length>=2);
}

/* Photo */
const _PC={};
async function _ph(fid,el){
  if(!fid||fid.startsWith('data:'))return;
  const streamUrl='/api/proxy?endpoint=photo/stream&fid='+encodeURIComponent(fid);
  _si(el,streamUrl);
}
function _si(el,src){el.innerHTML=`<img src="${src}" style="width:100%;max-height:200px;object-fit:contain;border-radius:14px;margin-bottom:10px;border:1px solid rgba(74,144,217,.2);display:block" onerror="this.parentElement.innerHTML=''">`}

async function boot(){
  if(!TID){showErr("URL da test ID yo'q");return}
  try{
    let resp=_cl(TID);
    if(!resp){
      const ctrl=new AbortController();
      const tmo=setTimeout(()=>ctrl.abort(),12000);
      let r;
      try{
        r=await fetch(API+'?endpoint=test/'+TID+'/full',{signal:ctrl.signal});
      }catch(fe){
        clearTimeout(tmo);
        showErr(fe.name==='AbortError'
          ?"Internet sekin — qayta urinib ko'ring"
          :"Tarmoq xatosi — ulanishni tekshiring");
        return;
      }
      clearTimeout(tmo);
      resp=await r.json();
      if(!resp||resp.error){showErr('Test topilmadi: '+TID);return}
      _cs(TID,resp);
    }
    meta=resp.testData||resp;

    let questions=norm(resp.questions||resp.testData?.questions||meta.questions||[]);
    if(!questions.length){showErr("Bu testda savollar yo'q");return}

    // Savollar aralashtiriladi — faqat meta da shuffle_questions:false bo'lsa to'xtatiladi
    if(meta.shuffle_questions!==false&&meta.shuffleQuestions!==false){
      for(let i=questions.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[questions[i],questions[j]]=[questions[j],questions[i]]}
    }
    questions=questions.map(q=>{
      const o=[...q.opts];const ct=o[q.correct];
      for(let i=o.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[o[i],o[j]]=[o[j],o[i]]}
      return{...q,opts:o,correct:o.indexOf(ct)};
    });
    if(DEMO&&questions.length>DMAX)questions=questions.slice(0,DMAX);
    qs=questions;
    answers=new Array(qs.length).fill(null);
    t0=Date.now();

    /* Subject */
    $('subjectTitle').textContent=meta.title||TID;

    /* Timer */
    const timeSec=(meta.time_limit||0)*60;
    const _tb=document.getElementById('timer-box');
    if(_tb)_tb.style.display='flex';
    if(timeSec>0){
      // Countdown
      let rem=timeSec;
      const upd=()=>{
        const tEl=$('timerText');
        if(tEl){
          tEl.textContent=fmt(rem);
          tEl.style.color=rem<60?'#dc2626':'';
        }
      };
      upd();
      tmr=setInterval(()=>{rem--;upd();if(rem<=0){clearInterval(tmr);finish()}},1000);
    } else {
      // Countup — o'tgan vaqt
      let elapsed=0;
      const upd=()=>{const tEl=$('timerText');if(tEl)tEl.textContent=fmt(elapsed)};
      upd();
      tmr=setInterval(()=>{elapsed++;upd()},1000);
    }

    /* Show quiz */
    $('scr-load').style.display='none';
    $('quizArea').style.display='flex';
    $('quizArea').style.flexDirection='column';
    $('quizArea').style.alignItems='center';

    renderQ();
  }catch(e){console.error(e);showErr('Yuklanmadi: '+e.message)}
}

function showErr(msg){
    const _bs=document.getElementById("bottom-stats");if(_bs)_bs.style.display="block";
  $('scr-load').innerHTML=`<div style="text-align:center;padding:2rem"><div style="font-size:2.5rem;margin-bottom:12px">⚠️</div><p style="color:rgba(44,74,122,.7);font-size:.9rem;margin-bottom:14px">${msg}</p><button onclick="history.back()" style="padding:11px 26px;border-radius:14px;background:linear-gradient(135deg,#4a90d9,#6bb0f0);border:none;color:#fff;font-family:inherit;font-weight:600;cursor:pointer">← Orqaga</button></div>`;
}

function updateHeader(){
  const done=answers.filter(a=>a!==null).length;
  const pct=Math.round(done/qs.length*100);
  if($('progFill'))$('progFill').style.width=pct+'%';
  if($('qStatText'))$('qStatText').textContent=(cur+1)+' / '+qs.length;
  if($('pctStat'))$('pctStat').textContent=pct+'%';
}

function renderQ(){
  const q=qs[cur];

  /* Savol matni */
  $('qNumber').textContent='SAVOL '+String(cur+1).padStart(2,'0');
  $('qText').textContent=q.txt;

  /* Rasm */
  let imgW=$('_imgw');
  if(!imgW){imgW=document.createElement('div');imgW.id='_imgw';const qc=document.querySelector('.question-card');if(qc)qc.insertBefore(imgW,$('qText'));}
  imgW.innerHTML='';
  if(q.img&&q.img.startsWith('data:')){_si(imgW,q.img)}
  else if(q.photo){_ph(q.photo,imgW)}

  /* Nav */
  $('prevBtn').disabled=cur===0;
  $('nextBtn').disabled=cur===qs.length-1;
  $('nextBtn').textContent=cur===qs.length-1?'✅ Yakunlash':'Keyingi →';

  /* Options */
  const ans=answers[cur];
  const done=ans!==null;
  $('optionsWrap').innerHTML=q.opts.map((o,i)=>{
    let cls='option fx-glow';
    if(done){if(i===q.correct)cls+=' correct';else if(i===ans)cls+=' wrong';}
    else if(ans===i)cls+=' selected';
    const dis=done?'disabled':'';
    const _chk = (done && i===q.correct) ? '<span class="fx-check">\u2713</span>' : '';
    return`<button class="${cls}" onclick="pick(${i})" ${dis}>
      <span class="option-radio"><span class="radio-dot"></span></span>
      ${LBL[i]}) ${esc(o)}${_chk}
    </button>`;
  }).join('');

  /* Izoh — javob berilgandan keyin variantlar ostida ko'rinadi */
  let explW=$('_explw');
  if(!explW){
    explW=document.createElement('div');
    explW.id='_explw';
    $('optionsWrap').insertAdjacentElement('afterend', explW);
  }
  if(done && q.expl){
    explW.className='answer-explain';
    explW.innerHTML='<span class="answer-explain-ic">💡</span><span class="answer-explain-tx">'+esc(q.expl)+'</span>';
  } else {
    explW.innerHTML='';
    explW.className='';
  }

  updateHeader();

  /* Pastki statistika yangilash + ko'rsatish (test davomida jonli) */
  const _bsLive=document.getElementById("bottom-stats");if(_bsLive)_bsLive.style.display="block";
  const bA=document.getElementById("bAtt");if(bA)bA.textContent=att;
  const bC=document.getElementById("bCor");if(bC){const _p=bC.textContent;bC.textContent=cor;if(_p!==String(cor))fxBump(bC);}
  const bW=document.getElementById("bWrg");if(bW){const _p=bW.textContent;bW.textContent=att-cor;if(_p!==String(att-cor))fxBump(bW);}
  const bP=document.getElementById("bPct");if(bP)bP.textContent=att>0?Math.round(cor/att*100)+"%":"0%";
}
/* statistika raqami o'zgarganda kichik "bump" animatsiyasi */
function fxBump(el){ el.style.animation='none'; void el.offsetWidth; el.style.animation='statBump .4s cubic-bezier(.34,1.32,.55,1)'; }

function pick(i){
  if(answers[cur]!==null)return;
  answers[cur]=i;att++;
  const _ok=(i===qs[cur].correct);
  if(_ok)cor++;
  renderQ();
  if(_ok){
    // Telegram quiz-poll uslubida: konfetti + toʻgʻri variant halqasi
    fxConfettiBurst();
    // Telegram HapticFeedback (ishonchli), fallback — vibrate
    if(TG && TG.HapticFeedback){
      try{ TG.HapticFeedback.notificationOccurred('success'); }catch{}
    } else if(navigator.vibrate){ navigator.vibrate(30); }
    const _opts=document.querySelectorAll('#optionsWrap .option.correct');
    _opts.forEach(el=>el.classList.add('fx-ring'));
  } else {
    if(TG && TG.HapticFeedback){
      try{ TG.HapticFeedback.notificationOccurred('error'); }catch{}
    } else if(navigator.vibrate){ navigator.vibrate([15,40,15]); }
  }
}

function prevQ(){if(cur>0){cur--;renderQ()}}
function nextQ(){if(cur<qs.length-1){cur++;renderQ()}else finish()}

function askFinish(){
  const left=answers.filter(a=>a===null).length;
  if(left>0){if(!confirm(`${left} ta savol javobsiz.\nTugatmoqchimisiz?`))return}
  else{if(!confirm('Testni tugatmoqchimisiz?'))return}
  finish();
}

async function finish(){
  if(finished)return;finished=true;
  clearInterval(tmr);
  const elapsed=Math.floor((Date.now()-t0)/1000);
  const tot=qs.length;
  const correct=qs.filter((q,i)=>answers[i]===q.correct).length;
  const pct=Math.round(correct/tot*100);
  const passScore=meta?.passing_score||60;
  const passed=pct>=passScore;

  /* Result screen */
  $('quizArea').style.display='none';
  const _bsh=document.getElementById('bottom-stats');if(_bsh)_bsh.style.display='none';
  $('resultScreen').style.display='flex';
  $('resultScreen').style.flexDirection='column';
  $('resultScreen').style.alignItems='center';
  $('resultIcon').textContent=pct>=80?'🏆':pct>=60?'🎓':pct>=40?'📚':'💪';
  $('resultScore').textContent=correct+'/'+tot;
  $('rCorrect').textContent=correct;
  $('rWrong').textContent=tot-correct;
  $('rPct').textContent=pct+'%';
  // Yangi IDlar
  const rTime=document.getElementById('rTime');
  if(rTime)rTime.textContent=fmt(elapsed);
  const rPass=document.getElementById('rPass');
  if(rPass)rPass.textContent=passScore+'%';
  const rStatus=document.getElementById('rStatus');
  if(rStatus)rStatus.textContent=passed?'✅':'❌';
  $('resultMsg').textContent=passed
    ?`🌟 Tabriklaymiz! ${pct}% — O'tdingiz!`
    :`💪 ${pct}% — Yana urinib ko'ring!`;

  /* Save */
  if(UID&&!DEMO){
    const si=document.getElementById('saveStatus')||document.createElement('div');
    si.id='saveStatus';si.style.display='block';
    si.style.cssText='padding:10px 16px;border-radius:12px;font-size:.8rem;font-weight:600;background:rgba(74,144,217,.08);border:1px solid rgba(74,144,217,.2);color:rgba(44,74,122,.7);margin:10px 0';
    si.textContent='⏳ Natija saqlanmoqda...';
    try{
      const uA=qs.map((_,i)=>answers[i]!==null?answers[i]:-1);
      const res=await fetch(API+'?endpoint=result/save',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({testId:TID,testTitle:meta?.title||TID,subject:meta?.category||meta?.subject||'',userId:UID,user_id:UID,userName:UNAME,user_name:UNAME,userUsername:UUN,user_username:UUN,score:pct,correct,total:tot,percentage:pct,passing_score:passScore,passed,elapsed,detailed_results:uA,userAnswers:uA,completedAt:new Date().toISOString(),source:DEMO?'web_demo':'web_test'})
      }).then(r=>r.json());
      if(res?.ok){
        si.style.color='#059669';si.style.background='rgba(5,150,105,.07)';si.style.borderColor='rgba(5,150,105,.3)';
        si.textContent='✅ Natija saqlandi va statistikaga qo\'shildi!';
        try{const ls=JSON.parse(localStorage.getItem('tp_results')||'[]');ls.unshift({testId:TID,testTitle:meta?.title||TID,userId:UID,correct,total:tot,percentage:pct,score:pct,elapsed,passing_score:passScore,passed,completedAt:new Date().toISOString()});localStorage.setItem('tp_results',JSON.stringify(ls.slice(0,200)))}catch{}
      }else{si.style.color='#dc2626';si.textContent='⚠️ '+(res?.error||'Xato')}
    }catch{si.style.color='#dc2626';si.textContent='⚠️ Ulanish xatosi'}
  }else if(DEMO){
    const sd=document.getElementById('saveStatus')||document.createElement('div');
    sd.id='saveStatus';sd.style.display='block';
    sd.style.cssText='padding:8px 14px;border-radius:10px;font-size:.78rem;color:rgba(180,100,20,.8);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);margin:10px 0';
    sd.textContent='🔍 Demo rejim — natija saqlanmaydi';
  }
}

function retryTest(){
  finished=false;cur=0;att=0;cor=0;
  answers=new Array(qs.length).fill(null);
  qs=qs.map(q=>{const o=[...q.opts];const ct=o[q.correct];for(let i=o.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[o[i],o[j]]=[o[j],o[i]]}return{...q,opts:o,correct:o.indexOf(ct)}});
  clearInterval(tmr);t0=Date.now();
  const timeSec=(meta?.time_limit||0)*60;
  if(timeSec>0){let rem=timeSec;const upd=()=>{if($('timerText'))$('timerText').textContent=fmt(rem)};upd();tmr=setInterval(()=>{rem--;upd();if(rem<=0){clearInterval(tmr);finish()}},1000)}
  $('resultScreen').style.display='none';
  $('quizArea').style.display='flex';
  const _bsr=document.getElementById('bottom-stats');if(_bsr)_bsr.style.display='block';
  $('quizArea').style.flexDirection='column';
  $('quizArea').style.alignItems='center';
  renderQ();
}

/* HTML da prevBtn/nextBtn/finishBtn onclick ni override qilamiz */
/* quiz_graduate original onclick lar uchun alias */
let _revOpen=false;
function toggleReview(){
  _revOpen=!_revOpen;
  const ra=document.getElementById('reviewArea');
  if(ra)ra.style.display=_revOpen?'block':'none';
  const rb=document.getElementById('reviewBtn');
  if(rb)rb.textContent=_revOpen?'📋 Yopish':'📋 Tahlil ko\'rish';
  if(_revOpen){
    const LBL=['A','B','C','D','E','F','G','H','I','J'];
    const rl=document.getElementById('reviewList');
    if(!rl)return;
    rl.innerHTML=qs.map((q,i)=>{
      const ua=answers[i];const ok=ua===q.correct;
      return`<div style="background:rgba(255,255,255,.7);border:1px solid rgba(74,144,217,.15);
        border-radius:12px;padding:12px 14px;margin-bottom:8px;
        border-left:3px solid ${ua!==undefined?(ok?'#059669':'#dc2626'):'rgba(74,144,217,.2)'}">
        <div style="font-size:.82rem;font-weight:600;color:rgba(44,74,122,.85);margin-bottom:6px;line-height:1.4">${i+1}. ${esc(q.txt)}</div>
        ${ua!==undefined
          ?`<span style="display:inline-block;padding:2px 9px;border-radius:6px;font-size:.72rem;font-weight:700;background:${ok?'rgba(5,150,105,.12)':'rgba(220,38,38,.1)'};color:${ok?'#059669':'#dc2626'}">${ok?'✅':'❌'} ${LBL[ua]||ua}) ${esc(q.opts[ua]||'')}</span>`
          :'<span style="display:inline-block;padding:2px 9px;border-radius:6px;font-size:.72rem;font-weight:700;background:rgba(220,38,38,.08);color:#dc2626">⏭ O\'tkazildi</span>'}
        ${!ok&&ua!==undefined?`<br><span style="display:inline-block;margin-top:4px;padding:2px 9px;border-radius:6px;font-size:.72rem;font-weight:700;background:rgba(74,144,217,.1);color:#2c6db5">✅ ${LBL[q.correct]}) ${esc(q.opts[q.correct]||'')}</span>`:''}
        ${q.expl?`<div style="font-size:.73rem;color:rgba(44,74,122,.5);margin-top:5px">💡 ${esc(q.expl)}</div>`:''}
      </div>`;
    }).join('');
  }
}
function goBack(){if(document.referrer)history.back();else location.href='/dashboard.html';}

function finishQuiz(){ askFinish(); }
function restart(){ retryTest(); }

document.addEventListener('DOMContentLoaded',()=>{
  /* ── Random background image ──────────────────────────
     Rasmlar shu fayil bilan bir papkada: fon1.jpg ... fon10.jpg
     Hozir 5 ta faol, keyinchalik BG_COUNT ni oshirish kifoya
  ────────────────────────────────────────────────────── */
  (function(){
    const BG_COUNT = 5;
    const BG_EXT   = 'jpg';
    const n = Math.floor(Math.random() * BG_COUNT) + 1;
    const url = 'fon' + n + '.' + BG_EXT;
    document.documentElement.style.setProperty('--bg-image', 'url(' + url + ')');
  })();
  const pb=document.getElementById('prevBtn');if(pb)pb.onclick=()=>prevQ();
  const nb=document.getElementById('nextBtn');if(nb)nb.onclick=()=>nextQ();
  const fb=document.getElementById('finishBtn');if(fb)fb.onclick=()=>askFinish();
  boot();
});

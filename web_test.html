    background-color: #eef2f8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 20px;
    position: relative;
  }

  /* ===== HEADER ===== */
  .top-bar {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 0;
  }
  .prog-box {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 10px 16px;
    flex: 1;
    box-shadow: 0 2px 12px rgba(80,120,200,0.1);
  }
  .prog-bar-track {
    height: 6px;
    background: rgba(180,200,240,0.4);
    border-radius: 3px;
    overflow: hidden;
  }
  .prog-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a90d9, #6bb0f0);
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .timer-box {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 12px rgba(80,120,200,0.1);
    white-space: nowrap;
  }
  .timer-icon { font-size: 18px; }
  .timer-text {
    font-size: 20px;
    font-weight: 700;
    color: #2c4a7a;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
  }
  .timer-text.warning { color: #e05030; animation: pulse 0.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .stats-box {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    box-shadow: 0 2px 12px rgba(80,120,200,0.1);
    min-width: 100px;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #4a6a9a;
    font-weight: 500;
  }
  .stat-icon { font-size: 14px; }
  .stat-val { font-weight: 700; color: #2c4a7a; }

  /* ===== SUBJECT TITLE ===== */
  .subject-card {
    width: 100%;
    max-width: 480px;
    margin: 12px 16px 0;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(14px);
    border-radius: 18px;
    padding: 16px 20px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(80,120,200,0.12);
  }
  .subject-title {
    font-size: 20px;
    font-weight: 700;
    color: #2c5aa0;
    line-height: 1.3;
  }

  /* ===== QUESTION ===== */
  .question-card {
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 12px 16px 0;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 26px 22px;
    text-align: center;
    box-shadow: 0 6px 24px rgba(80,120,200,0.13);
    position: relative;
  }
  .q-number {
    font-size: 11px;
    font-weight: 600;
    color: #7090c0;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .question-text {
    font-size: 18px;
    font-weight: 500;
    color: #1a2a4a;
    line-height: 1.6;
  }

  /* ===== OPTIONS ===== */
  .options-wrap {
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 10px 16px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    border: 2px solid rgba(180,210,255,0.4);
    border-radius: 16px;
    padding: 16px 20px;
    text-align: left;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: #2a3a5a;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 10px rgba(80,120,200,0.08);
  }
  .option:hover {
    background: rgba(230,240,255,0.85);
    border-color: rgba(74,144,217,0.6);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(74,144,217,0.2);
  }
  .option.selected {
    background: rgba(74,144,217,0.15);
    border-color: rgba(74,144,217,0.7);
  }
  .option.correct {
    background: rgba(40,180,100,0.15);
    border-color: rgba(40,180,100,0.7);
    color: #1a6a40;
  }
  .option.wrong {
    background: rgba(220,60,60,0.1);
    border-color: rgba(220,60,60,0.6);
    color: #8a1a1a;
  }
  .option-radio {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(74,144,217,0.5);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .option.correct .option-radio { border-color: #28b464; background: #28b464; }
  .option.wrong .option-radio { border-color: #dc3c3c; background: #dc3c3c; }
  .option.selected .option-radio { border-color: #4a90d9; background: #4a90d9; }
  .radio-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: white;
    display: none;
  }
  .option.selected .radio-dot,
  .option.correct .radio-dot,
  .option.wrong .radio-dot { display: block; }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 16px 16px 0;
    display: flex;
    gap: 10px;
  }
  .nav-btn {
    flex: 1;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    border: 1.5px solid rgba(180,210,255,0.5);
    border-radius: 14px;
    padding: 14px 12px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #2c4a7a;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 2px 10px rgba(80,120,200,0.08);
  }
  .nav-btn:hover { background: rgba(230,240,255,0.9); border-color: rgba(74,144,217,0.5); transform: translateY(-1px); }
  .nav-btn.finish {
    background: linear-gradient(135deg, rgba(74,144,217,0.85), rgba(100,160,230,0.85));
    color: white;
    border-color: transparent;
    box-shadow: 0 4px 16px rgba(74,144,217,0.35);
  }
  .nav-btn.finish:hover { box-shadow: 0 6px 24px rgba(74,144,217,0.5); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* ===== RESULT ===== */
  .result-screen {
    display: none;
    width: calc(100% - 32px);
    max-width: 480px;
    margin: 20px 16px 0;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .result-card {
    width: 100%;
    background: rgba(255,255,255,0.78);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 36px 28px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(80,120,200,0.15);
  }
  .result-icon { font-size: 72px; margin-bottom: 12px; }
  .result-score {
    font-size: 52px;
    font-weight: 800;
    color: #2c5aa0;
    line-height: 1;
  }
  .result-label { font-size: 14px; color: #7090c0; margin: 6px 0 20px; letter-spacing: 1px; }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .r-stat {
    background: rgba(240,246,255,0.8);
    border-radius: 14px;
    padding: 14px 8px;
  }
  .r-stat-val { font-size: 22px; font-weight: 700; color: #2c5aa0; }
  .r-stat-lbl { font-size: 10px; color: #7090c0; margin-top: 4px; font-weight: 500; }
  .result-msg { font-size: 15px; color: #4a6a9a; margin-bottom: 24px; line-height: 1.5; }
  .restart-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #4a90d9, #6bb0f0);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(74,144,217,0.4);
    transition: all 0.3s;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(74,144,217,0.5); }
</style>
<style>
/* ── Qo'shimcha stillar ── */
.screen-msg {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:60vh; gap:16px; text-align:center;
  padding:2rem;
}
.screen-spin {
  width:46px; height:46px; border:3.5px solid rgba(80,120,200,0.2);
  border-top-color:#4a90d9; border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.screen-txt {font-size:.9rem; color:rgba(44,74,122,0.7); line-height:1.6}
.back-btn-s {
  margin-top:.5rem; padding:11px 28px; border-radius:14px;
  background:linear-gradient(135deg,#4a90d9,#6bb0f0);
  border:none; color:#fff; font-family:inherit; font-weight:600;
  font-size:.87rem; cursor:pointer;
  box-shadow:0 4px 16px rgba(74,144,217,0.4);
}
.save-badge {
  margin-top:10px; padding:8px 16px; border-radius:10px;
  font-size:.78rem; font-weight:600; text-align:center;
}
.save-badge.ok  { background:rgba(80,200,120,0.15); color:#1a7a40; border:1px solid rgba(80,200,120,0.3); }
.save-badge.err { background:rgba(220,80,50,0.1);  color:#c0392b; border:1px solid rgba(220,80,50,0.2); }
.save-badge.loading { background:rgba(74,144,217,0.1); color:#2c6db5; border:1px solid rgba(74,144,217,0.25); }
.demo-badge {
  background:rgba(255,160,30,0.15); border:1px solid rgba(255,160,30,0.4);
  color:#c87020; padding:5px 14px; border-radius:99px;
  font-size:.72rem; font-weight:700; display:inline-block; margin-top:6px;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="prog-box">
    <div class="prog-bar-track">
      <div class="prog-bar-fill" id="progFill" style="width:0%"></div>
    </div>
  </div>
  <div class="timer-box" id="timer-box" style="display:none">
    <span class="timer-icon">⏱</span>
    <span class="timer-text" id="timerText">00:00</span>
  </div>
  <div class="stats-box">
    <div class="stat-row">
      <span class="stat-icon">👤</span>
      <span>Savol</span>
      <span class="stat-val" id="qStatText">1 / 0</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">◔</span>
      <span>Tugallangan</span>
      <span class="stat-val" id="pctStat">0%</span>
    </div>
  </div>
</div>

<!-- SUBJECT TITLE -->
<div class="subject-card" id="subject-card" style="display:none">
  <div class="subject-title" id="subjectTitle">Test</div>
  <div id="demo-label"></div>
</div>

<!-- LOADING -->
<div class="screen-msg" id="scr-load">
  <div class="screen-spin"></div>
  <div class="screen-txt">Yuklanmoqda...</div>
</div>

<!-- ERROR -->
<div class="screen-msg" id="scr-err" style="display:none">
  <div style="font-size:2.5rem">⚠️</div>
  <div class="screen-txt" id="err-msg">Xato</div>
  <button class="back-btn-s" onclick="history.back()">← Orqaga</button>
</div>

<!-- QUIZ AREA -->
<div id="quizArea" style="width:100%;display:none;flex-direction:column;align-items:center;gap:0;">
  <div class="question-card">
    <div class="q-number" id="qNumber">SAVOL 01</div>
    <div class="question-text" id="qText"></div>
  </div>
  <div class="options-wrap" id="optionsWrap"></div>
  <div class="bottom-nav">
    <button class="nav-btn" id="prevBtn" onclick="prevQ()">← Oldingi</button>
    <button class="nav-btn finish" id="finishBtn" onclick="askFinish()">🏁 Tugatish</button>
    <button class="nav-btn" id="nextBtn" onclick="nextQ()">Keyingi →</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="result-icon" id="resultIcon">🏆</div>
    <div class="result-score" id="resultScore">0/0</div>
    <div class="result-label">TO'G'RI JAVOBLAR</div>
    <div class="result-stats">
      <div class="r-stat"><div class="r-stat-val" id="rCorrect">0</div><div class="r-stat-lbl">To'g'ri ✓</div></div>
      <div class="r-stat"><div class="r-stat-val" id="rWrong">0</div><div class="r-stat-lbl">Noto'g'ri ✗</div></div>
      <div class="r-stat"><div class="r-stat-val" id="rPct">0%</div><div class="r-stat-lbl">Foiz</div></div>
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="save-badge loading" id="save-badge" style="display:none"></div>
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center">
      <button class="restart-btn" onclick="retryTest()">🔄 Qayta boshlash</button>
      <button class="restart-btn" onclick="goBack()" style="background:rgba(74,144,217,0.15);border:1.5px solid rgba(74,144,217,0.3);color:#2c6db5">🏠 Chiqish</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   WEB_TEST.HTML — quiz_graduate.html dizaynida
   Bot API bilan to'liq integratsiya
══════════════════════════════════════════════ */

const LBL    = ['A','B','C','D','E','F','G','H'];
const API    = '/api/proxy';
const P      = new URLSearchParams(location.search);
const TID    = (P.get('id') || '').trim().toUpperCase();
const DEMO   = P.get('demo') === '1' || P.get('mode') === 'demo';
const DEMOMAX= 20;
const UID    = P.get('uid') || '';
const UNAME  = P.get('name') || ('User' + UID);
const UUNAME = P.get('uname') || '';

let qs = [], meta = null, answers = [];
let cur = 0, t0 = 0, tmr = null, finished = false;

const $ = id => document.getElementById(id);
const esc = s => { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; };

function fmt(s) {
  s = Math.max(0, s|0);
  const h = (s/3600)|0, m = ((s%3600)/60)|0, sec = s%60;
  if(h > 0) return [h,m,sec].map(v=>String(v).padStart(2,'0')).join(':');
  return [m,sec].map(v=>String(v).padStart(2,'0')).join(':');
}

function showErr(msg) {
  hide('scr-load'); hide('quizArea');
  $('err-msg').textContent = msg; show('scr-err');
}
function show(id){ const e=$(id); if(e){ e.style.display='flex'; e.style.flexDirection='column'; } }
function showFlex(id){ const e=$(id); if(e){ e.style.display='flex'; e.style.flexDirection='column'; e.style.alignItems='center'; } }
function hide(id){ const e=$(id); if(e) e.style.display='none'; }
function showBlock(id){ const e=$(id); if(e) e.style.display='block'; }

async function apiGet(ep){ const r=await fetch(`${API}?endpoint=${ep}`); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }
async function apiPost(ep,data){ const r=await fetch(`${API}?endpoint=${ep}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); return r.json(); }

function norm(raw) {
  return (raw||[]).map(q => {
    const txt  = q.text||q.question||q.q||'';
    const opts = (q.options||[]).map(o => String(o).replace(/^[A-H]\s*[).]\s*/i,'').trim());
    let correct = 0;
    if(typeof q.correct==='number') { correct = q.correct; }
    else if(typeof q.correct==='string') {
      const m = q.correct.match(/^([A-H])\s*[).]/i);
      if(m) correct = m[1].toUpperCase().charCodeAt(0)-65;
      else {
        const cc = q.correct.replace(/^[A-H]\s*[).\s]*/i,'').trim();
        const idx = opts.findIndex(o=>o===cc||o.includes(cc)||cc.includes(o));
        correct = idx>=0 ? idx : 0;
      }
    }
    return { txt, opts, correct, expl:q.explanation||'', photo:q.photo||null, img:q.image||null };
  }).filter(q => q.txt && q.opts.length >= 2);
}

async function boot() {
  if(!TID) { showErr("URL da test ID yo'q (?id=...)"); return; }
  try {
    const resp = await apiGet(`test/${TID}/full`);
    if(!resp || resp.error) { showErr('Test topilmadi: ' + TID); return; }

    // proxy.js qaytaradi: { testData:{...}, questions:[...] }
    meta = resp.testData || resp;
    const rawQs = resp.questions || resp.testData?.questions || meta.questions || [];

    let questions = norm(rawQs);
    if(!questions.length) { showErr("Bu testda savollar yo'q"); return; }

    // Shuffle
    if(meta.shuffle_questions || meta.shuffleQuestions) questions.sort(()=>Math.random()-.5);
    // Variantlarni aralashtirish
    questions = questions.map(q => {
      const o = [...q.opts]; const ct = o[q.correct];
      for(let i=o.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [o[i],o[j]]=[o[j],o[i]]; }
      return {...q, opts:o, correct:o.indexOf(ct)};
    });

    // Demo: 20 ta cheklov
    if(DEMO && questions.length > DEMOMAX) questions = questions.slice(0, DEMOMAX);
    qs = questions;
    answers = new Array(qs.length).fill(null);

    // UI
    $('subjectTitle').textContent = meta.title || meta.test_id || TID;
    if(DEMO) { $('demo-label').innerHTML = '<span class="demo-badge">🔍 DEMO — ' + DEMOMAX + ' ta savol</span>'; }
    showBlock('subject-card');

    // Timer
    t0 = Date.now();
    const timeSec = (meta.time_limit || meta.timeLimit || 0) * 60;
    if(timeSec > 0) {
      let rem = timeSec;
      showBlock('timer-box');
      $('timerText').textContent = fmt(rem);
      tmr = setInterval(() => {
        rem--;
        $('timerText').textContent = fmt(rem);
        if(rem <= 60) $('timerText').classList.add('warning');
        if(rem <= 0) { clearInterval(tmr); finish(); }
      }, 1000);
    }

    hide('scr-load');
    $('quizArea').style.display = 'flex';
    $('quizArea').style.flexDirection = 'column';
    $('quizArea').style.alignItems = 'center';
    renderQuestion();
  } catch(e) {
    console.error(e); showErr('Yuklashda xato: ' + e.message);
  }
}

function updateHeader() {
  const answered = answers.filter(a => a !== null).length;
  const pct = Math.round(answered / qs.length * 100);
  $('progFill').style.width = pct + '%';
  $('qStatText').textContent = (cur+1) + ' / ' + qs.length;
  $('pctStat').textContent   = pct + '%';
}

function renderQuestion() {
  if(!qs.length) return;
  const q = qs[cur];
  $('qNumber').textContent = 'SAVOL ' + String(cur+1).padStart(2,'0');
  $('qText').textContent   = q.txt;

  // Rasm — faqat base64 bo'lsa ko'rsatiladi (TG file_id saytda ko'rsatib bo'lmaydi)
  let imgEl = document.getElementById('q-img-wrap');
  if(!imgEl){
    imgEl = document.createElement('div');
    imgEl.id = 'q-img-wrap';
    imgEl.style.cssText = 'width:100%;max-width:440px;margin:0 auto 12px;';
    $('qText').insertAdjacentElement('beforebegin', imgEl);
  }
  if(q.img && q.img.startsWith('data:')){
    imgEl.innerHTML = '<img src="'+q.img+'" style="width:100%;max-height:200px;object-fit:contain;border-radius:14px;border:1.5px solid rgba(74,144,217,0.2);background:rgba(255,255,255,0.6);">';
  } else if(q.photo) {
    imgEl.innerHTML = '<div style="padding:8px 14px;background:rgba(74,144,217,0.08);border:1px solid rgba(74,144,217,0.2);border-radius:10px;font-size:.75rem;color:rgba(44,74,122,0.6);text-align:center;">📷 Rasm bot orqali ko'rsatiladi</div>';
  } else {
    imgEl.innerHTML = '';
  }

  const wrap = $('optionsWrap');
  wrap.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    if(answers[cur] === i) btn.classList.add('selected');
    const lbl = LBL[i] || String(i);
    btn.innerHTML = `<span class="option-radio"><span class="radio-dot"></span></span>${lbl}) ${esc(opt)}`;
    btn.onclick = () => selectAnswer(i);
    wrap.appendChild(btn);
  });

  $('prevBtn').disabled = cur === 0;
  $('nextBtn').disabled = cur === qs.length - 1;
  updateHeader();
}

function selectAnswer(i) {
  answers[cur] = i;
  renderQuestion();
}

function prevQ(){ if(cur > 0){ cur--; renderQuestion(); } }
function nextQ(){ if(cur < qs.length-1){ cur++; renderQuestion(); } }

function askFinish() {
  const left = answers.filter(a => a === null).length;
  if(left > 0) {
    if(!confirm(left + " ta savol javobsiz qoldi.\nTestni tugatmoqchimisiz?")) return;
  } else {
    if(!confirm("Testni tugatmoqchimisiz?")) return;
  }
  finish();
}

async function finish() {
  if(finished) return;
  finished = true;
  clearInterval(tmr);

  const elapsed   = Math.floor((Date.now()-t0)/1000);
  const tot       = qs.length;
  const correct   = qs.filter((q,i) => answers[i]===q.correct).length;
  const wrong     = answers.filter(a=>a!==null).length - correct;
  const pct       = Math.round(correct/tot*100);
  const passScore = meta?.passing_score || meta?.passScore || 60;
  const passed    = pct >= passScore;

  // UI
  hide('quizArea');
  showFlex('resultScreen');

  $('resultIcon').textContent  = pct>=80?'🏆': pct>=60?'🎓': pct>=40?'📚':'💪';
  $('resultScore').textContent = correct + '/' + tot;
  $('rCorrect').textContent    = correct;
  $('rWrong').textContent      = tot - correct;
  $('rPct').textContent        = pct + '%';
  $('resultMsg').textContent   = passed
    ? "Ajoyib natija! O'tdingiz! 🌟"
    : pct>=40 ? "O'rtacha natija. Ko'proq mashq qiling! 📖"
    : "Yana urinib ko'ring! Kuchingizni to'plang! 🔥";

  // Save
  const sb = $('save-badge');
  if(UID && !DEMO) {
    sb.style.display = 'block';
    sb.className     = 'save-badge loading';
    sb.textContent   = '⏳ Natija saqlanmoqda...';
    try {
      const uAns = qs.map((_,i) => answers[i]!==null ? answers[i] : -1);
      const res  = await apiPost('result/save', {
        testId: TID, testTitle: meta?.title||TID,
        subject: meta?.category||meta?.subject||'',
        userId: UID, user_id: UID, userName: UNAME, user_name: UNAME,
        userUsername: UUNAME, user_username: UUNAME,
        score: pct, correct, total: tot, percentage: pct,
        passing_score: passScore, passed, elapsed,
        detailed_results: uAns, userAnswers: uAns,
        completedAt: new Date().toISOString(),
        source: DEMO ? 'web_demo' : 'web_test',
      });
      if(res?.ok) {
        sb.className = 'save-badge ok';
        sb.textContent = '✅ Natija saqlandi va statistikaga qo'shildi';
        try {
          const ls = JSON.parse(localStorage.getItem('tp_results')||'[]');
          ls.unshift({ testId:TID, testTitle:meta?.title||TID, userId:UID,
            correct, total:tot, percentage:pct, score:pct, elapsed,
            passing_score:passScore, passed, completedAt:new Date().toISOString(),
            source:'web_test' });
          localStorage.setItem('tp_results', JSON.stringify(ls.slice(0,200)));
        } catch{}
      } else {
        sb.className = 'save-badge err';
        sb.textContent = '⚠️ ' + (res?.error || 'Saqlashda xato');
      }
    } catch(e) {
      sb.className = 'save-badge err';
      sb.textContent = '⚠️ Ulanish xatosi';
    }
  } else if(DEMO) {
    sb.style.display = 'block';
    sb.className     = 'save-badge loading';
    sb.textContent   = '🔍 Demo rejim — natija saqlanmaydi';
  }
}

function retryTest() {
  finished = false;
  cur = 0;
  answers = new Array(qs.length).fill(null);
  // Qayta shuffle
  qs = qs.map(q => {
    const o=[...q.opts]; const ct=o[q.correct];
    for(let i=o.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [o[i],o[j]]=[o[j],o[i]]; }
    return {...q, opts:o, correct:o.indexOf(ct)};
  });
  clearInterval(tmr); t0 = Date.now();
  const timeSec = (meta?.time_limit||0)*60;
  if(timeSec > 0) {
    let rem = timeSec; $('timerText').textContent = fmt(rem); $('timerText').classList.remove('warning');
    tmr = setInterval(()=>{ rem--; $('timerText').textContent=fmt(rem); if(rem<=60)$('timerText').classList.add('warning'); if(rem<=0){clearInterval(tmr);finish();} }, 1000);
  }
  hide('resultScreen'); showFlex('quizArea');
  renderQuestion();
}

function goBack() {
  if(document.referrer) history.back();
  else location.href = '/dashboard.html';
}

boot();
</script>

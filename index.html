<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TestPro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
:root{--acc:#7C5CFC;--acc2:#C840E9;--acc-soft:rgba(124,92,252,0.12);--acc-glow:rgba(124,92,252,0.35);--bg:#F2F0FB;--bg-2:#E9E5F8;--card:rgba(255,255,255,0.75);--border:rgba(124,92,252,0.14);--border-2:rgba(0,0,0,0.07);--text:#13101F;--text2:#5B5674;--text3:#A09DC0;--navbar-bg:rgba(242,240,251,0.88);--shadow:0 8px 32px rgba(124,92,252,0.15);--shadow-lg:0 20px 60px rgba(124,92,252,0.22);--shadow-sm:0 3px 12px rgba(124,92,252,0.1);--grad:linear-gradient(135deg,#7C5CFC 0%,#C840E9 100%);--mesh:radial-gradient(ellipse at 20% 30%,rgba(124,92,252,0.08) 0%,transparent 55%),radial-gradient(ellipse at 80% 10%,rgba(200,64,233,0.07) 0%,transparent 50%);--r-xs:8px;--r-sm:12px;--r:18px;--r-lg:24px;--r-xl:32px;--green:#059669;--red:#ef4444;
  --acc:#7C5CFC;--acc2:#C840E9;--border:rgba(124,92,252,.1);
  --shadow:0 2px 12px rgba(124,92,252,.08)}
[data-theme=dark]{--bg:#0C0A1A;--bg-2:#130E26;--card:rgba(22,16,42,0.8);--border:rgba(124,92,252,0.22);--border-2:rgba(255,255,255,0.07);--text:#EDE8FF;--text2:#8880B0;--text3:#4D4870;--navbar-bg:rgba(12,10,26,0.92);--shadow:0 8px 32px rgba(0,0,0,0.45);--acc-soft:rgba(124,92,252,0.18);
  --border:rgba(124,92,252,.2);--shadow:0 2px 12px rgba(0,0,0,.3)}
body{font-family:'DM Sans',sans-serif;min-height:100vh;background:var(--bg);color:var(--text);overflow-x:hidden}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:54px;z-index:500;
  display:flex;align-items:center;justify-content:space-between;padding:0 1rem;
  background:var(--bg);backdrop-filter:blur(20px)}
.logo{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:900;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-mid{display:flex;align-items:center;gap:.2rem}
.ntab{padding:.4rem .82rem;border-radius:99px;font-size:.8rem;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;background:transparent;color:var(--text2);transition:all .2s}
.ntab.on{background:rgba(255,255,255,.9);color:var(--acc);box-shadow:0 2px 8px rgba(0,0,0,.08)}
[data-theme=dark] .ntab.on{background:rgba(255,255,255,.1)}
.nav-r{display:flex;align-items:center;gap:.4rem}
.ibtn{width:34px;height:34px;border-radius:99px;border:none;cursor:pointer;font-size:.9rem;
  background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;transition:all .2s}
[data-theme=dark] .ibtn{background:rgba(255,255,255,.1)}
.lbtn{padding:.4rem .88rem;border-radius:99px;font-size:.78rem;font-weight:700;
  border:none;cursor:pointer;font-family:inherit;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;transition:all .2s}
.lbtn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,92,252,.35)}

/* PAGE */
.page{padding:66px 0 3rem}

/* GROUP */
.grp{margin-bottom:1.8rem}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 1rem;margin-bottom:.75rem}
.grp-l{display:flex;align-items:center;gap:.65rem}
.grp-icon{width:46px;height:46px;border-radius:14px;background:rgba(255,255,255,.9);
  box-shadow:0 2px 10px rgba(0,0,0,.07);
  display:flex;align-items:center;justify-content:center;font-size:1.55rem;flex-shrink:0}
[data-theme=dark] .grp-icon{background:rgba(255,255,255,.1)}
.grp-nm{font-size:.94rem;font-weight:800;color:var(--text)}
.grp-ct{font-size:.72rem;color:var(--text3);font-weight:600;margin-top:.05rem}
.see-all{font-size:.75rem;font-weight:700;color:var(--acc);cursor:pointer;border:none;
  background:none;font-family:inherit;white-space:nowrap;padding:.28rem .7rem;
  border-radius:99px;border:1.5px solid rgba(124,92,252,.25);transition:all .18s}
.see-all:hover{background:rgba(124,92,252,.07)}

/* SCROLL (card view) */
.scroll{display:flex;gap:.75rem;overflow-x:auto;padding:0 1rem .5rem;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* CARD */
.card{min-width:175px;max-width:175px;flex-shrink:0;scroll-snap-align:start;
  background:var(--card);border-radius:18px;padding:.9rem;
  border:1.5px solid var(--border);box-shadow:var(--shadow);
  cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,92,252,.15)}
.card-icon{width:46px;height:46px;border-radius:13px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:1.45rem;margin-bottom:.6rem}
.card-title{font-size:.85rem;font-weight:800;color:var(--text);margin-bottom:.15rem;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35}
.card-author{font-size:.68rem;color:var(--text3);margin-bottom:.45rem;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chips{display:flex;gap:.28rem;flex-wrap:wrap;margin-bottom:.6rem}
.ch{display:inline-flex;align-items:center;padding:.15rem .42rem;border-radius:99px;
  font-size:.64rem;font-weight:600;background:rgba(124,92,252,.07);color:var(--acc);
  border:1px solid rgba(124,92,252,.12)}
[data-theme=dark] .ch{background:rgba(124,92,252,.2)}
.card-btn{display:block;width:100%;padding:.6rem;border-radius:11px;border:none;
  cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  font-family:inherit;font-size:.8rem;font-weight:700;text-align:center;
  transition:all .2s;margin-top:auto}
.card-btn:hover{box-shadow:0 4px 14px rgba(124,92,252,.35)}

/* LIST VIEW (barchasi bosilganda) */
.list-view{padding:0 1rem}
.li{background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:.75rem .9rem;margin-bottom:.42rem;
  display:flex;align-items:center;gap:.6rem;cursor:pointer;transition:all .18s}
.li:hover{border-color:rgba(124,92,252,.3);transform:translateX(2px);box-shadow:0 3px 12px rgba(124,92,252,.1)}
.li-ico{width:38px;height:38px;border-radius:11px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-nm{font-size:.84rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.1rem}
.li-meta{font-size:.67rem;color:var(--text3);display:flex;gap:.35rem;flex-wrap:wrap}
.li-btn{padding:.32rem .75rem;border-radius:9px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  font-family:inherit;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}

/* BACK BTN */
.back-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .7rem;margin:0 1rem .8rem;
  border-radius:10px;border:1.5px solid var(--border);background:var(--card);
  cursor:pointer;font-size:.8rem;font-weight:700;color:var(--text2);
  width:fit-content;transition:all .18s}
.back-btn:hover{border-color:rgba(124,92,252,.3);color:var(--acc)}

/* HERO */
.hero{text-align:center;padding:3.5rem 1.5rem}
.hero-h{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,5vw,2.5rem);
  font-weight:900;line-height:1.1;margin-bottom:.85rem}
.hero-h span{background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-p{font-size:.88rem;color:var(--text2);max-width:380px;margin:0 auto 1.5rem;line-height:1.6}
.hero-btn{padding:.78rem 2rem;border-radius:13px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;
  font-family:inherit;font-size:.9rem;font-weight:700;transition:all .22s}
.hero-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,92,252,.35)}

/* CTA */
.cta{margin:1rem 1rem 0;background:linear-gradient(135deg,var(--acc),var(--acc2));
  border-radius:20px;padding:1.5rem;text-align:center}
.cta-h{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:900;color:#fff;margin-bottom:.5rem}
.cta-p{font-size:.78rem;color:rgba(255,255,255,.82);margin-bottom:1rem}
.cta-btn{padding:.65rem 1.6rem;border-radius:11px;border:none;cursor:pointer;
  background:#fff;color:var(--acc);font-weight:800;font-size:.84rem;font-family:inherit;transition:all .2s}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(0,0,0,.2)}

/* LOADER */
.sp{width:28px;height:28px;border:3px solid rgba(124,92,252,.15);border-top-color:var(--acc);
  border-radius:50%;animation:spin .7s linear infinite;margin:2.5rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
.emp{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:.82rem}
.err{text-align:center;padding:1.5rem;color:#ef4444;font-size:.82rem}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo" onclick="goTo('index.html')">TestPro</div>
  <div class="nav-mid">
    <button class="ntab on">Testlar</button>
    <button class="ntab" onclick="goTo('dashboard.html')">Dashboard</button>
  </div>
  <div class="nav-r">
    <button class="ibtn" id="tbtn">🌙</button>
    <button class="lbtn" id="auth-btn" onclick="goTo('login.html')">Kirish</button>
  </div>
</nav>

<div class="page">
  <div id="content"><div class="sp"></div></div>
  <div class="cta" id="cta" style="display:none">
    <div class="cta-h">O'z testingizni yarating!</div>
    <p class="cta-p">Bir necha daqiqada professional test yarating va do'stlaringiz bilan ulashing</p>
    <button class="cta-btn" onclick="goTo('login.html')">Boshlash →</button>
  </div>
</div>

<script src="js/api.js"></script>
<script>
const TH={
  get(){return localStorage.getItem('tp_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')},
  set(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('tp_theme',t);
    const b=document.getElementById('tbtn');if(b)b.textContent=t==='dark'?'☀️':'🌙'},
  toggle(){this.set(this.get()==='dark'?'light':'dark')}
};
TH.set(TH.get());
document.getElementById('tbtn').onclick=()=>TH.toggle();

AuthHelpers.getCurrentUser().then(u=>{
  if(u){const b=document.getElementById('auth-btn');b.textContent='Dashboard';b.onclick=()=>goTo('dashboard.html');}
}).catch(()=>{});

const ICON={english:'🇬🇧',arabic:'🕌',russian:'🇷🇺',turkish:'🇹🇷',math:'🧮',it:'💻',science:'🔬',religion:'📖',other:'📚'};

/* ── Karta qurish ── */
function buildCard(t, icon){
  const c=document.createElement('div');
  c.className='card';
  c.onclick=()=>goTo('test.html?id='+(t.test_id||t.id));
  c.innerHTML=`
    <div class="card-icon">${icon}</div>
    <div class="card-title">${esc(t.title)}</div>
    <div class="card-author">${esc(t.creator_name||t.authorName||'Anonim')}</div>
    <div class="chips">
      <span class="ch">📝 ${t.question_count||0}</span>
      <span class="ch">👁 ${t.solve_count||0}</span>
      ${t.time_limit?`<span class="ch">⏱ ${t.time_limit}daq</span>`:''}
      ${t.avg_score?`<span class="ch">⭐${Math.round(t.avg_score)}%</span>`:''}
    </div>
    <button class="card-btn">Boshlash →</button>`;
  return c;
}

/* ── Ro'yxat elementi qurish ── */
function buildListItem(t, icon){
  const el=document.createElement('div');
  el.className='li';
  el.onclick=()=>goTo('test.html?id='+(t.test_id||t.id));
  el.innerHTML=`
    <div class="li-ico">${icon}</div>
    <div class="li-info">
      <div class="li-nm">${esc(t.title)}</div>
      <div class="li-meta">
        <span>📝 ${t.question_count||0}</span>
        <span>👁 ${t.solve_count||0}</span>
        ${t.avg_score?`<span>⭐${Math.round(t.avg_score)}%</span>`:''}
        <span>${esc(t.creator_name||'Anonim')}</span>
      </div>
    </div>
    <button class="li-btn" onclick="event.stopPropagation();goTo('test.html?id='+(this.dataset.id))">▶️</button>`;
  el.querySelector('.li-btn').dataset.id=t.test_id||t.id;
  return el;
}

/* ── Guruh listini ko'rsatish (barchasi bosilganda) ── */
function showGroupList(subj, arr, icon, sub){
  const wrap=document.getElementById('content');
  document.getElementById('cta').style.display='none';
  wrap.innerHTML='';

  const back=document.createElement('button');
  back.className='back-btn';
  back.innerHTML='← Orqaga';
  back.onclick=()=>renderGroups(window._allPub);
  wrap.appendChild(back);

  const hdr=document.createElement('div');
  hdr.className='grp-hdr';
  hdr.innerHTML=`
    <div class="grp-l">
      <div class="grp-icon">${icon}</div>
      <div>
        <div class="grp-nm">${esc(sub.label)}</div>
        <div class="grp-ct">${arr.length} ta test</div>
      </div>
    </div>`;
  wrap.appendChild(hdr);

  const list=document.createElement('div');
  list.className='list-view';
  arr.forEach(t=>list.appendChild(buildListItem(t,icon)));
  wrap.appendChild(list);
}

/* ── Asosiy guruhlar ko'rinishi ── */
function renderGroups(pub){
  const wrap=document.getElementById('content');
  wrap.innerHTML='';
  document.getElementById('cta').style.display='block';

  const grps={};
  pub.forEach(t=>{const k=t.category||t.subject||'other';if(!grps[k])grps[k]=[];grps[k].push(t);});

  Object.entries(grps).forEach(([subj,arr])=>{
    const sub=getSubject(subj);
    const icon=ICON[subj]||getIco(subj)||'📚';

    const g=document.createElement('div');
    g.className='grp';

    const hdr=document.createElement('div');
    hdr.className='grp-hdr';
    hdr.innerHTML=`
      <div class="grp-l">
        <div class="grp-icon">${icon}</div>
        <div>
          <div class="grp-nm">${esc(sub.label)}</div>
          <div class="grp-ct">${arr.length} ta test</div>
        </div>
      </div>
      <button class="see-all">Barchasi →</button>`;
    hdr.querySelector('.see-all').onclick=()=>showGroupList(subj,arr,icon,sub);
    g.appendChild(hdr);

    const scroll=document.createElement('div');
    scroll.className='scroll';
    arr.forEach(t=>scroll.appendChild(buildCard(t,icon)));
    g.appendChild(scroll);

    wrap.appendChild(g);
  });
}

/* ── Load ── */
(async()=>{
  const wrap=document.getElementById('content');
  try{
    const tests=await DB.getPublicTests();
    const pub=(tests||[]).filter(t=>t.visibility==='public');
    window._allPub=pub;

    if(!pub.length){
      wrap.innerHTML=`<div class="hero">
        <div class="hero-h">TestPro ga<br/><span>xush kelibsiz!</span></div>
        <p class="hero-p">Hozircha ommaviy test mavjud emas. Birinchi bo'ling!</p>
        <button class="hero-btn" onclick="goTo('login.html')">Test yaratish →</button>
      </div>`;
      return;
    }
    renderGroups(pub);
  }catch(e){
    wrap.innerHTML=`<div class="err">❌ Xatolik: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
